      // find the race instead of shipping a broken cascade.
      const pendingAtSrc = this._pendingAdoptsByCell.get(srcKey);
      console.warn(
        `[petal-lost] detach failed at (${move.from.r},${move.from.c})→(${move.to.r},${move.to.c})` +
        ` · src.children=${src.petalLayer ? src.petalLayer.children.length : 'n/a'}` +
        ` · src.petalCount=${src.petalCount}` +
        ` · src.destroyed=${src.destroyed}` +
        ` · src._debugTag=${src._debugTag || '—'}` +
        ` · pending-in-src=${pendingAtSrc ? pendingAtSrc.length : 0}`
      );
      // Full grid dump: color + petalCount + live children count + any
      // pending inbound flights per cell. Makes it obvious which flower
      // the animator is confused about.
      try {
        const dump = [];
        for (let r = 0; r < GAME.ROWS; r++) {
          for (let c = 0; c < GAME.COLS; c++) {
            const f = this.scene.flowers[r][c];
            const pend = (this._pendingAdoptsByCell.get(`${r},${c}`) || []).length;
            dump.push({
              cell: `${r},${c}`,
              color: f ? f.colorName : 'null',
              petalCount: f ? f.petalCount : 0,
              children: f && f.petalLayer ? f.petalLayer.children.length : 0,
              destroyed: f ? !!f.destroyed : false,
              tag: f && f._debugTag ? f._debugTag : '—',
              pendingIn: pend,
            });
          }
        }
        console.table(dump);
      } catch (e) { /* ignore */ }
      // Drop this adopt registration since no flight actually happens.
      const list = this._pendingAdoptsByCell.get(dstKey);
      if (list) {
        const idx = list.indexOf(adoptPromise);
        if (idx >= 0) list.splice(idx, 1);
      }
      markAdopted();
      finishDetached();
      return;
    }
    // The petal is physically detached — unblock any newEmpty flight waiting
    // on this cell's detach so it can do its pre-flight register pause now.
    finishDetached();

    // Reparent to fxLayer, preserving world pose.
    const worldPos = petal.parent
      ? petal.parent.toGlobal(new PIXI.Point(petal.x, petal.y))
      : new PIXI.Point(petal.x, petal.y);
    // (petal was already removed from petalLayer in detach, so .parent is null)
    // Instead, use source.petalLayer's world transform with petal's local pos:
    const srcBulbWorld = src.getBulbWorldPos();

    this.scene.fxLayer.addChild(petal);
    const startPos = this.scene.fxLayer.toLocal(srcBulbWorld);
    // Offset by the petal's rotation direction so it starts near the tip it came from
    const off = this.cellSize * 0.10;
    startPos.x += Math.sin(petal.rotation) * off;
    startPos.y += -Math.cos(petal.rotation) * off;
    petal.position.set(startPos.x, startPos.y);

    const endPos = this.scene.fxLayer.toLocal(dstBulbWorld);

    // Quadratic bezier control point: midpoint raised above the higher end
    // to create an arc; height scales with horizontal distance + a floor.
    const midX = (startPos.x + endPos.x) / 2;
    const dist = Math.hypot(endPos.x - startPos.x, endPos.y - startPos.y);
    const midY = Math.min(startPos.y, endPos.y) - (dist * 0.3 + this.cellSize * 0.35);

    // Drive a t 0→1 tween and sample position + tangent each frame.
    const state = { t: 0, scale: petal.scale.x, alpha: 1 };
    const startScale = petal.scale.x;

    return new Promise(resolve => {
      // "Tearing-off" pop: petal swells slightly with a springy overshoot, as
      // if building tension before snapping free of the bulb.
      gsap.to(petal.scale, {
        x: startScale * 1.18, y: startScale * 1.18,
        duration: T(0.16) * speedMul, ease: 'back.out(1.8)',
      });

      // Main flight. power3.inOut = slow launch (resistance), fast mid-flight,
      // gentle landing. Randomise the peak slightly so repeated flights don't
      // trace identical arcs.
      const arcWobble = 0.85 + Math.random() * 0.3;
      const adjMidY = startPos.y + (midY - startPos.y) * arcWobble;

      // The petal bends while airborne — peaks mid-flight and straightens
      // out on arrival. Random sign so not every petal bends the same way.
      const bendMax = 0.22 * (Math.random() < 0.5 ? -1 : 1);

      gsap.to(state, {
        t: 1,
        duration: T(0.70) * speedMul,
        ease: 'power3.inOut',
        onUpdate: () => {
          const t = state.t;
          const omt = 1 - t;
          // Quadratic bezier position
          const px = omt * omt * startPos.x + 2 * omt * t * midX + t * t * endPos.x;
          const py = omt * omt * startPos.y + 2 * omt * t * adjMidY + t * t * endPos.y;
          petal.x = px;
          petal.y = py;
          // Rotation tracks tangent (tip leads the arc)
          const dx = 2 * omt * (midX - startPos.x) + 2 * t * (endPos.x - midX);
          const dy = 2 * omt * (adjMidY - startPos.y) + 2 * t * (endPos.y - adjMidY);
          petal.rotation = Math.atan2(dy, dx) + Math.PI / 2;
          // Bend — sine ramp 0 → bendMax → 0 over the flight
          petal.skew.x = Math.sin(t * Math.PI) * bendMax;
        },
        onComplete: async () => {
          // Straighten before handoff so adopt's reflow tween doesn't fight skew
          petal.skew.x = 0;
          gsap.to(petal.scale, {
            x: startScale, y: startScale,
            duration: T(0.14) * speedMul, ease: 'sine.inOut',
          });
          // Hand off to the target flower but DON'T await the reflow tween —
          // resolve this flight's promise immediately so the next pass can
          // start while the previous pass's reflow animations are still
          // playing. This gives visible overlap of petals across passes.
          if (!dst.destroyed) {
            dst.adoptFlyingPetal(petal);
          } else {
            gsap.killTweensOf(petal);
            gsap.killTweensOf(petal.scale);
            petal.destroy();
          }
          // Clear the pending-adopt registration for this destination so
          // any queued detach-from-dst move can proceed.
          const list = this._pendingAdoptsByCell && this._pendingAdoptsByCell.get(dstKey);
          if (list) {
            const idx = list.indexOf(adoptPromise);
            if (idx >= 0) list.splice(idx, 1);
          }
          markAdopted();
          resolve();
        },
      });
    });
  }

  // ─── DISSOLVE ────────────────────────────────────────────────────────────
  async _playDissolve(ev) {
    // Transfer passes run fire-and-forget so they can overlap — but by the
    // time we're dissolving, every petal flight must have landed/adopted so
    // the grid state matches the model. Drain the in-flight petal queue.
    if (this._inFlightPetals && this._inFlightPetals.length) {
      const pending = this._inFlightPetals;
      this._inFlightPetals = [];
      await Promise.all(pending);
    }

    // Heal step — any flower whose petalCount disagrees with the model's
    // authoritative grid state gets force-corrected via setPetalCount. This
    // is a safety net: if a flight went silent (destroyed-branch or a race
    // I haven't tracked), the pot visibly snaps to the right count rather
    // than triggering downstream [petal-lost] cascades.
    if (ev.gridAtDissolve) {
      for (let r = 0; r < GAME.ROWS; r++) {
        for (let c = 0; c < GAME.COLS; c++) {
          const expected = ev.gridAtDissolve[r][c];
          const f = this.scene.flowers[r][c];
          if (!expected || !f || f.destroyed) continue;
          if (f.petalCount !== expected.petals) {
            console.warn(
              `[heal] (${r},${c}) animator=${f.petalCount} model=${expected.petals} · ` +
              `tag=${f._debugTag || '—'} — resyncing`
            );
            f.killPetalTweens();
            f.setPetalCount(expected.petals);
          }
        }
      }
    }

    // Held beat so the player can see the pots at their post-transfer state
    // (full blooms with all 8 petals, empties cleared) BEFORE the bloom
    // animation starts and the payout text pops.
    if (ev.fullBlooms.length > 0) {
      // Sanity check — drain should have left every blooming flower at MAX
      // petals AND its petalLayer should have exactly MAX children.
      for (const fb of ev.fullBlooms) {
        const f = this.scene.flowers[fb.r][fb.c];
        if (!f) continue;
        const kids = f.petalLayer ? f.petalLayer.children.length : 0;
        if (f.petalCount !== GAME.MAX_PETALS || kids !== GAME.MAX_PETALS) {
          console.warn(
            `[bloom-sync] (${fb.r},${fb.c}) petalCount=${f.petalCount} children=${kids} ` +
            `expected=${GAME.MAX_PETALS} · tag=${f._debugTag || '—'}`
          );
        }
      }
      await SpinAnimator._wait(T(220));
    }

    const promises = [];
    for (const fb of ev.fullBlooms) promises.push(this._animateFullBloom(fb));

    // Skip empties that already took off during an earlier transferPass — the
    // animator launched them the moment they committed to empty, so their
    // flight is already in progress (or landed).
    const launched = this._launchedEmpties || new Set();
    const remaining = ev.emptyDissolves.filter(ed => !launched.has(`${ed.r},${ed.c}`));
    remaining.forEach((ed, i) => {
      promises.push(this._animateEmptyDissolve(ed, i));
    });

    // Notify UI so the running payout updates mid-animation.
    if (this.onProgress) this.onProgress(ev);

    // Include early-launched fire-and-forget empties so no pot lands AFTER
    // the dissolve/cascade completes.
    if (this._inFlightEmpties && this._inFlightEmpties.length) {
      promises.push(...this._inFlightEmpties);
      this._inFlightEmpties = [];
    }

    await Promise.all(promises);
    this._launchedEmpties = null;
    await SpinAnimator._wait(T(120));
  }

  async _animateFullBloom(d) {
    const flower = this.scene.flowers[d.r][d.c];
    if (!flower) return;
    this.scene.flowers[d.r][d.c] = null;

    const colorHex = hexToNumber(COLOR_BY_NAME[d.color].hex);
    const worldPos = flower.toGlobal(new PIXI.Point(0, flower._bulbY));
    const fxPos = this.scene.fxLayer.toLocal(worldPos);

    // Small radial sparkle burst — confined to roughly the flower's own cell
    // so the effect stays local and doesn't feel like a screen-wide explosion.
    spawnBurst(this.scene.fxLayer, fxPos.x, fxPos.y, colorHex, 16, this.cellSize * 0.7);

    // Payout text over the dissolving symbol — the coin value this Full Bloom
    // contributed to the win. Alt-2: already multiplied by the cell tile
    // (d.pay includes the cellMult); alt-1: just basePay.
    const payoutAmount = (d.pay !== undefined)
      ? d.pay * this.currentBet
      : d.basePay * this.currentBet;
    spawnPayoutText(this.scene.fxLayer, fxPos.x, fxPos.y - 6, payoutAmount);
    // If a tile multiplier amplified this bloom, flash it as confirmation.
    if (d.cellMult && d.cellMult > 0) {
      const badge = scene.tileBadges && scene.tileBadges[d.r] && scene.tileBadges[d.r][d.c];
      if (badge) {
        gsap.fromTo(badge.scale,
          { x: 1.6, y: 1.6 },
          { x: 1, y: 1, duration: 0.6, ease: 'elastic.out(1, 0.35)' });
      }
    }

    flower.killPetalTweens();

    return new Promise(resolve => {
      // Pump at peak so the bloom is LEGIBLE before collapsing. Timeline:
      //   0.00 → 0.45   swell + begin rotation
      //   0.45 → 0.70   hold big-and-spinning (read the bloom)
      //   0.70 → 1.10   shrink + fade away
      const tl = gsap.timeline({
        onComplete: () => {
          // Kill petal tweens BEFORE destroy — destroy({children:true})
          // nulls each petal's transform, and any still-running gsap tween
          // on that petal then errors every frame.
          flower.killPetalTweens();
          gsap.killTweensOf(flower);
          gsap.killTweensOf(flower.scale);
          gsap.killTweensOf(flower.position);
          if (!flower.destroyed) flower.destroy({ children: true });
          resolve();
        }
      });
      // Gentle swell — stays within its cell.
      tl.to(flower.scale, { x: 1.45, y: 1.45, duration: T(0.40), ease: 'back.out(2)' }, 0);
      // Slow rotating spin over the whole animation.
      tl.to(flower,       { rotation: Math.PI * 1.2, duration: T(1.00), ease: 'power1.inOut' }, 0);
      // Hold briefly at peak so the player can register the bloom.
      tl.to(flower.scale, { x: 1.4, y: 1.4, duration: T(0.20), ease: 'sine.inOut' }, T(0.45));
      // Shrink + fade out.
      tl.to(flower.scale, { x: 0.05, y: 0.05, duration: T(0.35), ease: 'power2.in' }, T(0.65));
      tl.to(flower,       { alpha: 0,         duration: T(0.35), ease: 'power2.in' }, T(0.65));
    }).then(() => {
      // Alt-2: after the bloom animates away, drop its multiplier tile
      // (big reveal at cell centre → shrink to corner) plus half-value
      // echoes flying to all 8 adjacent cells.
      if (ALT_MODE === 'alt2' && d.newTile) {
        return this._animateBloomMultiplierDrop(d);
      }
    });
  }

  // Big multiplier reveal that drops ON a bloom cell (alt-2). Runs AFTER
  // the bloom's own swell/fade sequence has finished. d.newTile carries
  // { value, totalAfter, spreads } from the model.
  _animateBloomMultiplierDrop(d) {
    const rect = this.scene.cells[d.r] && this.scene.cells[d.r][d.c];
    if (!rect || !d.newTile) return Promise.resolve();
    const worldPos = this.scene.flowerLayer.toGlobal(
      new PIXI.Point(rect.x + rect.w / 2, rect.y + rect.h / 2));
    const fxPos = this.scene.fxLayer.toLocal(worldPos);

    // Values involved:
    //   rngValue   = the raw tile value the RNG just rolled (e.g. 50).
    //   oldValue   = whatever this cell was accumulated to BEFORE this bloom.
    //   totalValue = oldValue + rngValue (what the cell will show after).
    const rngValue   = d.newTile.value;
    const totalValue = d.newTile.totalAfter;
    const oldValue   = Math.max(0, totalValue - rngValue);

    return new Promise(resolve => {
      const bigText = new PIXI.Text(formatTileMult(rngValue), {
        fontFamily: FONT,
        fontSize: Math.max(28, Math.floor(this.cellSize * 0.58)),
        fill: 0xFFD54F,
        stroke: 0x3D1C02,
        strokeThickness: Math.max(3, 4 * currentGameScale),
      });
      bigText.anchor.set(0.5);
      bigText.x = fxPos.x;
      bigText.y = fxPos.y;
      bigText.alpha = 0;
      bigText.scale.set(0.25);
      this.scene.fxLayer.addChild(bigText);

      // Compute final badge position / scale (based on the TOTAL value
      // since that's what will end up at the corner badge).
      const measure = new PIXI.Text(formatTileMult(totalValue), {
        fontFamily: FONT,
        fontSize: Math.max(13, 15 * currentGameScale),
      });
      const finalBadgeW = measure.width + _tileBadgePadX() * 2;
      measure.destroy();
      const badgeCentre = _tileBadgeCenterForCell(rect, finalBadgeW);
      const cornerWorld = this.scene.flowerLayer.toGlobal(
        new PIXI.Point(badgeCentre.x, badgeCentre.y));
      const cornerFx = this.scene.fxLayer.toLocal(cornerWorld);
      const bigH  = bigText.height;
      const tileH = _tileBadgeHeight();
      const shrinkScale = Math.max(0.25, tileH / Math.max(1, bigH));

      const tl = gsap.timeline({
        onComplete: () => {
          setCellTileBadge(d.r, d.c, totalValue, { skipEntry: true });
          if (!bigText.destroyed) bigText.destroy();
          resolve();
        },
      });
      // 1) Pop in at centre, showing the RAW RNG value (e.g. "50×").
      tl.to(bigText, { alpha: 1, duration: 0.14, ease: 'power2.out' }, 0);
      tl.to(bigText.scale, { x: 1, y: 1, duration: 0.34, ease: 'back.out(2.2)' }, 0);
      // 2) Hold briefly so the player can read the RNG value.
      tl.to(bigText.scale, { x: 1.08, y: 1.08, duration: 0.14, ease: 'sine.inOut' }, 0.34);
      // 3) Launch neighbour echoes mid-hold — each echo carries the raw
      //    HALF-value (not the neighbour's total).
      tl.call(() => {
        if (d.newTile.spreads && d.newTile.spreads.length) {
          this._spawnSpreadEchoes(fxPos, d.newTile.spreads, rect);
        }
      }, null, 0.48);
      // 4) Count-up from the RNG value to the new total — this is the
      //    "adds on top of the old multiplier" visual. Only fires if the
      //    cell already had a value; otherwise RNG == total and there's
      //    nothing to count up to.
      if (oldValue > 0 && totalValue !== rngValue) {
        const counter = { v: rngValue };
        tl.to(counter, {
          v: totalValue,
          duration: 0.38,
          ease: 'power2.out',
          onUpdate: () => {
            // Round so we don't flash decimals when halves accumulate.
            const shown = Math.round(counter.v * 10) / 10;
            bigText.text = formatTileMult(shown);
          },
          onComplete: () => { bigText.text = formatTileMult(totalValue); },
        }, 0.48);
        // Tiny scale bump on arrival of the sum.
        tl.to(bigText.scale, { x: 1.2, y: 1.2, duration: 0.12, ease: 'back.out(2)' }, 0.74);
        tl.to(bigText.scale, { x: 1,   y: 1,   duration: 0.12, ease: 'sine.inOut' }, 0.86);
      }
      // 5) Shrink + travel to the corner badge (showing the total).
      tl.to(bigText, {
        x: cornerFx.x,
        y: cornerFx.y,
        duration: 0.42,
        ease: 'power2.inOut',
      }, 0.98);
      tl.to(bigText.scale, {
        x: shrinkScale, y: shrinkScale,
        duration: 0.42,
        ease: 'power2.inOut',
      }, 0.98);
      tl.to(bigText, {
        alpha: 0.0,
        duration: 0.12,
        ease: 'power2.in',
      }, 1.30);
    });
  }

  // Fire an "echo" of half the multiplier value from a centre fxLayer
  // position toward each neighbour cell that received a spread. The echo
  // is a smaller version of the big reveal — it flies into the neighbour
  // cell, lands with a pulse, and the neighbour's badge is updated to
  // its new accumulated total on arrival.
  _spawnSpreadEchoes(originFx, spreads, originRect) {
    if (!spreads || !spreads.length) return;
    for (const sp of spreads) {
      const nRect = this.scene.cells[sp.r] && this.scene.cells[sp.r][sp.c];
      if (!nRect) continue;
      const targetLocal = this.scene.flowerLayer.toGlobal(
        new PIXI.Point(nRect.x + nRect.w / 2, nRect.y + nRect.h / 2));
      const targetFx = this.scene.fxLayer.toLocal(targetLocal);

      const echoText = new PIXI.Text(formatTileMult(sp.add), {
        fontFamily: FONT,
        fontSize: Math.max(18, Math.floor(this.cellSize * 0.30)),
        fill: 0xFFE29A,
        stroke: 0x3D1C02,
        strokeThickness: Math.max(2.5, 3 * currentGameScale),
      });
      echoText.anchor.set(0.5);
      echoText.x = originFx.x;
      echoText.y = originFx.y;
      echoText.alpha = 0;
      echoText.scale.set(0.5);
      this.scene.fxLayer.addChild(echoText);

      const totalAfter = sp.total;
      const oldTotal   = Math.max(0, totalAfter - sp.add);
      const tl = gsap.timeline({
        onComplete: () => {
          if (!echoText.destroyed) echoText.destroy();
        },
      });
      // 1) Burst into existence at centre, showing the HALF value (raw).
      tl.to(echoText, { alpha: 1, duration: 0.12, ease: 'power2.out' }, 0);
      tl.to(echoText.scale, { x: 1, y: 1, duration: 0.22, ease: 'back.out(2)' }, 0);
      // 2) Travel to the neighbour.
      tl.to(echoText, {
        x: targetFx.x,
        y: targetFx.y,
        duration: 0.36,
        ease: 'power2.inOut',
      }, 0.14);
      // 3) Impact: tiny overshoot.
      tl.to(echoText.scale, {
        x: 1.25, y: 1.25,
        duration: 0.10,
        ease: 'back.out(2.4)',
      }, 0.50);
      // 4) Hand off: count-up the neighbour's big cell text from its old
      //    total to the new total ON ARRIVAL, so the player sees the raw
      //    half-value merge INTO the cell's displayed number. If the
      //    neighbour had no prior tile, _animateAddToCellMult just drops
      //    a fresh big text at the new total.
      tl.call(() => {
        this._animateAddToCellMult(sp.r, sp.c, oldTotal, totalAfter);
      }, null, 0.60);
      // 5) Echo fades/shrinks out.
      tl.to(echoText, {
        alpha: 0,
        duration: 0.16,
        ease: 'power2.in',
      }, 0.60);
      tl.to(echoText.scale, {
        x: 0.6, y: 0.6,
        duration: 0.16,
        ease: 'power2.in',
      }, 0.60);
    }
  }

  // When an echo lands on a neighbour cell, count-up its big cell text
  // from the OLD total to the NEW total (so the player visually sees the
  // addition). Corner badge is updated to the final total at the end.
  _animateAddToCellMult(r, c, oldTotal, newTotal) {
    const rect = this.scene.cells[r] && this.scene.cells[r][c];
    if (!rect) return;
    // Ensure the big cell text exists. If the neighbour had no prior tile,
    // create one starting from 0 (it'll count up in the tween below).
    if (!scene.cellMultTexts[r][c]) {
      setCellMultText(r, c, oldTotal > 0 ? oldTotal : 1);
      // Kill the fresh pop-in animation — we'll drive scale/alpha ourselves.
      const t = scene.cellMultTexts[r][c];
      if (t) { gsap.killTweensOf(t); gsap.killTweensOf(t.scale); t.alpha = 0.85; t.scale.set(1); t.text = formatTileMult(oldTotal); }
    }
    const bigT = scene.cellMultTexts[r][c];
    const existingBadge = scene.tileBadges[r][c];

    // Count-up the big cell text.
    if (bigT) {
      const counter = { v: oldTotal };
      gsap.killTweensOf(counter);
      gsap.to(counter, {
        v: newTotal,
        duration: 0.32,
        ease: 'power2.out',
        onUpdate: () => {
          const shown = Math.round(counter.v * 10) / 10;
          bigT.text = formatTileMult(shown);
        },
        onComplete: () => {
          bigT.text = formatTileMult(newTotal);
        },
      });
      gsap.fromTo(bigT.scale,
        { x: 1.25, y: 1.25 },
        { x: 1,    y: 1,    duration: 0.35, ease: 'back.out(2)' });
    }

    // Similarly roll up the corner badge (or create it).
    if (existingBadge) {
      const counter2 = { v: oldTotal };
      gsap.killTweensOf(counter2);
      gsap.to(counter2, {
        v: newTotal,
        duration: 0.32,
        ease: 'power2.out',
        onUpdate: () => {
          const shown = Math.round(counter2.v * 10) / 10;
          existingBadge._badgeText.text = formatTileMult(shown);
          existingBadge._redraw();
          const w = existingBadge._computeW();
          const p = _tileBadgeCenterForCell(rect, w);
          existingBadge.x = p.x;
          existingBadge.y = p.y;
        },
        onComplete: () => {
          existingBadge._badgeText.text = formatTileMult(newTotal);
          existingBadge._redraw();
          const w = existingBadge._computeW();
          const p = _tileBadgeCenterForCell(rect, w);
          existingBadge.x = p.x;
          existingBadge.y = p.y;
          existingBadge._value = newTotal;
        },
      });
      gsap.fromTo(existingBadge.scale,
        { x: 1.35, y: 1.35 },
        { x: 1,    y: 1,    duration: 0.35, ease: 'back.out(2)' });
    } else {
      // No prior badge — drop a fresh one at the new total.
      setCellTileBadge(r, c, newTotal);
    }

    // Make sure the underlying tint exists / updates for the new total.
    setCellTint(r, c, newTotal);
  }

  async _animateEmptyDissolve(d, index = 0) {
    const flower = this.scene.flowers[d.r][d.c];
    if (!flower) return;
    this.scene.flowers[d.r][d.c] = null;
    flower.killPetalTweens();

    // Alt-2 empties don't drop multipliers — the pot just poofs in place.
    // Blooms are what place tiles (see _animateFullBloom for the reveal).
    if (ALT_MODE === 'alt2') {
      return new Promise(resolve => {
        const rect = this.scene.cells[d.r][d.c];
        const cx   = rect.x + rect.w / 2;
        const cy   = rect.y + rect.h / 2;
        const worldPos = this.scene.flowerLayer.toGlobal(new PIXI.Point(cx, cy));
        const fxPos    = this.scene.fxLayer.toLocal(worldPos);
        spawnPuff(this.scene.fxLayer, fxPos.x, fxPos.y, 14);
        gsap.to(flower.scale, { x: 0.05, y: 0.05, duration: T(0.30), ease: 'back.in(1.4)' });
        gsap.to(flower, {
          alpha: 0,
          duration: T(0.30),
          ease: 'power2.in',
          onComplete: () => {
            // CRITICAL: kill any tween running on each petal BEFORE the
            // flower is destroyed. destroy({children:true}) nulls each
            // petal's .transform; a lingering gsap tween then throws
            // "Cannot set properties of null (setting 'rotation')" every
            // frame — which is how petals were silently going missing.
            flower.killPetalTweens();
            gsap.killTweensOf(flower);
            gsap.killTweensOf(flower.scale);
            if (!flower.destroyed) flower.destroy({ children: true });
            resolve();
          },
        });
      });
    }

    // The Avalanche pill is permanent — no expand needed. Legacy call kept
    // as a safety net for non-permanent pills.
    if (GAME.MULTIPLIER_ENABLED && scene.winPill && !scene.winPill.isExpanded && scene.winPill.expand) {
      scene.winPill.expand();
    }

    // Reparent the flower out of the grid-masked flowerLayer and into the
    // un-masked fxLayer so it can fly all the way to the multiplier display.
    const worldPos = flower.getGlobalPosition();
    flower.parent && flower.parent.removeChild(flower);
    this.scene.fxLayer.addChild(flower);
    const startLocal = this.scene.fxLayer.toLocal(worldPos);
    flower.x = startLocal.x;
    flower.y = startLocal.y;

    // STAGGER — each empty pot in the dissolve set launches a little later
    // than the previous one so the stream reads as sequential rather than
    // one simultaneous burst.
    const staggerDelayMs = index * 130;  // ~130ms between launches
    if (staggerDelayMs > 0) {
      await new Promise(r => setTimeout(r, staggerDelayMs));
    }
    // Race guard — this flower might have been cleaned up by a resize etc.
    if (flower.destroyed) return;

    // Target: the MULTIPLIER half of the Win pill.
    let targetX = startLocal.x;
    let targetY = startLocal.y - this.cellSize * 3;
    const winPill = this.scene.winPill;
    if (winPill && winPill.rightValText) {
      const targetGlobal = winPill.rightValText.getGlobalPosition();
      const targetLocal = this.scene.fxLayer.toLocal(targetGlobal);
      targetX = targetLocal.x;
      targetY = targetLocal.y;
    }

    // Curved flight arc.
    const midX = (startLocal.x + targetX) / 2 + (Math.random() - 0.5) * 60;
    const midY = Math.min(startLocal.y, targetY) - this.cellSize * 0.8;

    const baseScale = flower.scale.x;

    return new Promise(resolve => {
      const state = { t: 0 };
      gsap.to(state, {
        t: 1,
        duration: T(0.65),
        ease: 'power2.in',
        onUpdate: () => {
          const t = state.t, omt = 1 - t;
          flower.x = omt * omt * startLocal.x + 2 * omt * t * midX + t * t * targetX;
          flower.y = omt * omt * startLocal.y + 2 * omt * t * midY + t * t * targetY;
        },
        onComplete: () => {
          // Capture arrival position before anything clears the flower.
          const impactX = flower.x;
          const impactY = flower.y;

          // Advance the multiplier UI the moment the pot hits — this is what
          // fills the progress bar in lockstep with each landing. Returns
          // true only when the tier actually advanced (value changed) so we
          // can gate the number-bounce on real changes.
          const multChanged = bumpMultiplierOnPotLanded();

          // Dust puff at the landing point (stays in fxLayer so it's always
          // on top — dust naturally reads above numbers).
          spawnPuff(this.scene.fxLayer, impactX, impactY, 16);

          // Re-home the pot into the Win pill so its z-depth becomes
          // "panel bg → pot → multiplier text" during the fade-out. Added
          // just BEFORE rightValText so the multiplier number always renders
          // above it.
          if (winPill && winPill.rightValText && !flower.destroyed) {
            const worldPos = flower.getGlobalPosition();
            flower.parent && flower.parent.removeChild(flower);
            const insertIdx = winPill.getChildIndex(winPill.rightValText);
            winPill.addChildAt(flower, insertIdx);
            const local = winPill.toLocal(worldPos);
            flower.x = local.x;
            flower.y = local.y;
          }

          // Quick fade-out AFTER the pot has arrived — keeps the pot fully
          // visible during the entire flight, then dissolves it at the end.
          gsap.to(flower, {
            alpha: 0,
            duration: T(0.22),
            ease: 'power2.in',
            onComplete: () => {
              // Kill petal tweens BEFORE destroy so lingering reflow
              // tweens don't try to set rotation on null transforms.
              if (flower.killPetalTweens) flower.killPetalTweens();
              gsap.killTweensOf(flower);
              gsap.killTweensOf(flower.scale);
              gsap.killTweensOf(flower.position);
              if (!flower.destroyed) flower.destroy({ children: true });
            },
          });

          // Bounce the MULTIPLIER value on landing — chunkier, with a longer
          // elastic settle for better "just got added" feedback. Only fires
          // when the value actually changed (tier advance) so consecutive
          // pots within the same tier don't make the number jitter.
          if (multChanged && winPill && winPill.rightValText && winPill.isExpanded) {
            gsap.killTweensOf(winPill.rightValText.scale);
            gsap.timeline()
              .to(winPill.rightValText.scale, {
                x: 2.3, y: 2.3, duration: 0.32, ease: 'back.out(1.8)',
              })
              .to(winPill.rightValText.scale, {
                x: 1, y: 1, duration: 0.95, ease: 'elastic.out(1, 0.32)',
              });
            gsap.fromTo(winPill.rightLabel,
              { alpha: 1 },
              { alpha: 0.65, duration: 0.22, yoyo: true, repeat: 1 });
          }

          resolve();
        },
      });

      // Gentle shrink during flight — less aggressive than before so the pot
      // stays clearly visible the whole way across.
      gsap.to(flower.scale, {
        x: baseScale * 0.55, y: baseScale * 0.55,
        duration: T(0.65), ease: 'power2.in',
      });

      // Subtle spin — no alpha tween here; the pot stays opaque until arrival.
      gsap.to(flower, {
        rotation: flower.rotation + Math.PI * 0.6,
        duration: T(0.65), ease: 'sine.inOut',
      });
    });
  }

  // ─── GRAVITY ─────────────────────────────────────────────────────────────
  async _playGravity(ev) {
    if (!ev.falls.length) return;
    const promises = [];
    // Capture move intents first, then update refs to avoid collisions.
    const moves = ev.falls.map(fall => ({
      flower: this.scene.flowers[fall.from.r][fall.from.c],
      from: fall.from,
      to: fall.to,
    }));
    // Null source cells first
    for (const m of moves) {
      if (m.flower) this.scene.flowers[m.from.r][m.from.c] = null;
    }
    // Assign destinations + tween
    for (const m of moves) {
      if (!m.flower) continue;
      this.scene.flowers[m.to.r][m.to.c] = m.flower;
      // Re-tag with the new location for petal accounting.
      m.flower._debugTag = `(${m.to.r},${m.to.c})@gravity<-(${m.from.r},${m.from.c})`;
      const targetRect = this.scene.cells[m.to.r][m.to.c];
      const targetY = targetRect.y + targetRect.h / 2;
      const distRows = m.to.r - m.from.r;
      promises.push(new Promise(resolve => {
        gsap.to(m.flower, {
          y: targetY,
          duration: T(0.22) + Math.min(distRows * T(0.06), T(0.24)),
          ease: 'power1.in',
          onComplete: () => {
            // Landing dust at the base of the cell.
            const dustWorld = this.scene.flowerLayer.toGlobal(
              new PIXI.Point(targetRect.x + targetRect.w / 2,
                             targetRect.y + targetRect.h * 0.88));
            const dustLocal = this.scene.fxLayer.toLocal(dustWorld);
            spawnLandingDust(this.scene.fxLayer, dustLocal.x, dustLocal.y, this.cellSize);

            gsap.timeline({ onComplete: resolve })
              .to(m.flower.scale, { y: 0.88, x: 1.08, duration: T(0.08), ease: 'sine.out' })
              .to(m.flower.scale, { y: 1,    x: 1,    duration: T(0.12), ease: 'sine.inOut' });
          },
        });
      }));
    }
    await Promise.all(promises);
  }

  // ─── REFILL ──────────────────────────────────────────────────────────────
  async _playRefill(ev) {
    const promises = [];
    // Group new cells by column; higher-row cells drop later (above lower ones)
    const byCol = {};
    for (const nc of ev.newCells) {
      (byCol[nc.c] ||= []).push(nc);
    }
    for (const c in byCol) byCol[c].sort((a, b) => a.r - b.r);

    for (const c in byCol) {
      byCol[c].forEach((nc, stackIdx) => {
        const rect = this.scene.cells[nc.r][nc.c];
        const flower = new FlowerSymbol(nc.color, nc.petals, this.cellSize);
        flower._debugTag = `(${nc.r},${nc.c})@refill`;
        flower.x = rect.x + rect.w / 2;
        // Spawn above the top of the grid, stacked so they don't visually overlap
        flower.y = this.scene.cells[0][0].y - rect.h * (1 + stackIdx * 1.05);
        this.scene.flowerLayer.addChild(flower);
        this.scene.flowers[nc.r][nc.c] = flower;

        const targetY = rect.y + rect.h / 2;
        promises.push(new Promise(resolve => {
          gsap.to(flower, {
            y: targetY,
            duration: T(0.32) + stackIdx * T(0.04),
            ease: 'power1.in',
            delay: stackIdx * T(0.04),
            onComplete: () => {
              // Landing dust at the base of the new flower's cell.
              const dustWorld = this.scene.flowerLayer.toGlobal(
                new PIXI.Point(rect.x + rect.w / 2, rect.y + rect.h * 0.88));
              const dustLocal = this.scene.fxLayer.toLocal(dustWorld);
              spawnLandingDust(this.scene.fxLayer, dustLocal.x, dustLocal.y, this.cellSize);

              gsap.timeline({ onComplete: resolve })
                .to(flower.scale, { y: 0.86, x: 1.10, duration: T(0.08), ease: 'sine.out' })
                .to(flower.scale, { y: 1,    x: 1,    duration: T(0.14), ease: 'sine.inOut' });
            },
          });
        }));
      });
    }
    await Promise.all(promises);
    await SpinAnimator._wait(T(80));
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// LAYOUT CONSTANTS
// ═══════════════════════════════════════════════════════════════════════════════
const FONT = "'Fredoka One', cursive";

const COLS        = 5;
const ROWS        = 4;
const GAP_REF     = 10;    // cell gap at 1080h
const FRAME_PAD   = 40;    // padding inside frame around cells
const BAR_H_REF   = 100;   // bottom bar height at 1080h
const SPIN_R_REF  = 56;    // spin button radius at 1080h
const LOGO_ZONE   = 0.16;  // top 16% of screen height
const GRID_GAP_B  = 0.06;  // 6% gap between grid bottom and bar

// ═══════════════════════════════════════════════════════════════════════════════
// LAYOUT CALCULATION
// ═══════════════════════════════════════════════════════════════════════════════
function calculateLayout(sw, sh) {
  const scale = sh / 1080;

  const gap       = GAP_REF * scale;
  const framePad  = FRAME_PAD * scale;
  const barH      = BAR_H_REF * scale;
  const spinR     = SPIN_R_REF * scale;

  const logoZoneH = sh * LOGO_ZONE;
  const barY      = sh - barH;
  const barCY     = sh - barH / 2;
  const gridGapB  = sh * GRID_GAP_B;
  const gridZoneY = logoZoneH;
  const gridZoneH = barY - gridGapB - gridZoneY;

  // Frame / cells
  const availH   = gridZoneH - framePad * 2;
  const cellSize = Math.floor((availH - (ROWS - 1) * gap) / ROWS);
  const cellsW   = COLS * cellSize + (COLS - 1) * gap;
  const cellsH   = ROWS * cellSize + (ROWS - 1) * gap;
  const frameW   = cellsW + framePad * 2;
  const frameH   = gridZoneH;
  const frameX   = (sw - frameW) / 2;
  const frameY   = gridZoneY;
  const cellsX   = frameX + framePad;
  const cellsY   = frameY + (frameH - cellsH) / 2;

  // Spin button
  const spinOuterR = (SPIN_R_REF + 14) * scale;
  const spinX      = sw - spinOuterR - 8 * scale;
  const spinY      = sh - spinOuterR - 4 * scale;

  // Bottom bar items
  const barAvail   = spinX - spinOuterR - 8 * scale;
  const itemMargin = barAvail * 0.02;
  const iconR      = barH * 0.26;
  const pillH      = barH * 0.64;
  const creditW    = barAvail * 0.17;
  const winW       = barAvail * 0.20;
  const adjBtnR    = barH * 0.20;
  const betW       = barAvail * 0.14;

  // Item positions (x in bar-local space, i.e. relative to x=0 on left side)
  const infoX   = itemMargin + iconR;
  const creditX = infoX + iconR + itemMargin + creditW / 2;
  const winX    = barAvail / 2;

  // BET group right-aligned
  const betGroupW     = adjBtnR * 2 + itemMargin + betW + itemMargin + adjBtnR * 2;
  const betGroupStart = barAvail - itemMargin - betGroupW;
  const minusX = betGroupStart + adjBtnR;
  const betX   = minusX + adjBtnR + itemMargin + betW / 2;
  const plusX  = betX + betW / 2 + itemMargin + adjBtnR;

  return {
    sw, sh, scale,
    gap, framePad, barH, spinR,
    logoZoneH, barY, barCY, gridGapB, gridZoneY, gridZoneH,
    cellSize, cellsW, cellsH,
    frameW, frameH, frameX, frameY, cellsX, cellsY,
    spinOuterR, spinX, spinY,
    barAvail, itemMargin, iconR, pillH, creditW, winW, adjBtnR, betW,
    infoX, creditX, winX, minusX, betX, plusX,
  };
}

// ═══════════════════════════════════════════════════════════════════════════════
// PIXI APP
// ═══════════════════════════════════════════════════════════════════════════════
const app = new PIXI.Application({
  resizeTo: window,
  backgroundColor: 0x7A6D57,
  antialias: true,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true,
});
document.body.appendChild(app.view);
app.view.style.display = 'block';

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE BUILDER
// ═══════════════════════════════════════════════════════════════════════════════
const scene = {
  bg: null,
  logoText: null,
  frame: null,
  cells: [],
  flowers: [],
  flowerLayer: null,
  fxLayer: null,
  balancePill: null,
  betPill: null,
  winPill: null,
  rtpText: null,
  spinButton: null,
  infoButton: null,
  paytableModal: null,
  barItems: {},
};

// Persist current grid across resizes so we don't re-spin on every resize.
let currentGrid = null;
let animator = null;

let uiState = {
  multiplier: 1,
  emptyCount: 0,
  multBarMaxEmpties: 10,
};

// The active gameScale — updated by buildScene each time. Kept at module
// scope so helpers outside buildScene (e.g. animateMultiplication) can size
// fonts/strokes consistently with the rest of the UI.
let currentGameScale = 1;

// ─── PLAYER STATE ───────────────────────────────────────────────────────────
const player = {
  balance: 10000,
  bet: 10,
  betLevels: [1, 2, 5, 10, 20, 50, 100, 200],
  betIndex: 3,          // starts at 10
  displayedWin: 0,      // last committed WIN value on screen
  // Tile-mode free-spin feature. When active, bet is locked, spins don't
  // deduct balance, multiplier tiles persist across spins.
  feature: {
    active:      false,
    spinsLeft:   0,
    cellMults:   null,   // carried over between spins while active (alt-2)
    lockedBet:   null,   // bet frozen at purchase time
    totalWin:    0,      // accumulated win across all feature spins
  },
};

const FEATURE_SPIN_COUNT = 15;
const FEATURE_COST_MULT  = 100;   // cost = 100 × bet

function featureCost() { return player.bet * FEATURE_COST_MULT; }
function canBuyFeature() {
  return ALT_MODE === 'alt2'
      && !player.feature.active
      && player.balance >= featureCost();
}

function canAffordSpin() {
  if (player.feature.active) return true;   // free spins during feature
  return player.balance >= player.bet;
}

function cycleBet(direction = +1) {
  // Bet locked while the free-spin feature is active.
  if (player.feature.active) return;
  // Clamp, don't wrap — minus at the lowest level and plus at the highest
  // are no-ops rather than cycling around to the opposite end.
  const next = player.betIndex + direction;
  if (next < 0 || next >= player.betLevels.length) return;
  player.betIndex = next;
  player.bet = player.betLevels[player.betIndex];
  updateBetText();
  updateSpinButtonState();
}

function roundedRectGraphics(x, y, w, h, r, fill, strokeColor, strokeWidth) {
  const g = new PIXI.Graphics();
  if (strokeColor !== undefined) g.lineStyle(strokeWidth, strokeColor, 1);
  g.beginFill(fill);
  g.drawRoundedRect(x, y, w, h, r);
  g.endFill();
  return g;
}

// Design reference — game composition was authored at 1920×1080
const DESIGN_W = 1920;
// Slightly taller than the 16:9 native so a 1080p viewport leaves enough
// vertical room for the native-size multiplier holder + full-size spin button
// below the frame. Only affects the vertical gameScale constraint.
const DESIGN_H = 1120;

function buildScene(L) {
  app.stage.removeChildren();
  scene.cells = [];
  scene.barItems = {};

  // ─── BACKGROUND ────────────────────────────────────────────────────────────
  // Flat color wash — no image. Color is set on the PIXI app backgroundColor,
  // which paints the whole canvas behind everything else. See the app init
  // where `backgroundColor` is configured.

  // ─── GAME SCALE ────────────────────────────────────────────────────────────
  // Scale the game composition relative to 1920×1080 design reference.
  // On larger screens, elements stay at their designed pixel size — more of the
  // background becomes visible around the composition.
  // On smaller screens, everything scales down uniformly.
  const gameScale = Math.min(L.sw / DESIGN_W, L.sh / DESIGN_H, 1.0);
  currentGameScale = gameScale;

  // Dimensions
  const frameW  = frameTexture.width * gameScale;
  const frameH  = frameTexture.height * gameScale;
  const logoScale = gameScale * 0.45;
  const logoW   = logoTexture.width * logoScale;
  const logoH   = logoTexture.height * logoScale;
  const gapX    = 24 * gameScale; // gap between frame and logo column

  // Frame is centered horizontally; vertically placed so there's enough room
  // below for the UI row (pills + spin button + RTP line) without overlap.
  //   UI budget at gameScale=1:  5 (gap) + 130 (holder) +  5 (gap) +
  //                             130 (spin btn / row height) + 25 (rtp) = 295
  // Frame top margin fills whatever's left above.
  const rightColW = logoW;
  const compX     = (L.sw - frameW) / 2;
  const UI_BELOW_BUDGET = 295 * gameScale;
  const compY     = Math.max(
    10 * gameScale,
    Math.min(
      (L.sh - frameH) / 2 - UI_BELOW_BUDGET / 2,  // vertical center, biased up
      L.sh - frameH - UI_BELOW_BUDGET             // never push UI off-screen
    )
  );

  // ─── FRAME (image w/ cells baked in) ───────────────────────────────────────
  scene.frame = new PIXI.Sprite(frameTexture);
  scene.frame.scale.set(gameScale);
  scene.frame.x = compX;
  scene.frame.y = compY;
  app.stage.addChild(scene.frame);

  // Right-column X anchor (center of column)
  const rightColCX = compX + frameW + gapX + rightColW / 2;

  // ─── LOGO ──────────────────────────────────────────────────────────────────
  scene.logoText = new PIXI.Sprite(logoTexture);
  scene.logoText.anchor.set(0.5, 0);
  scene.logoText.scale.set(logoScale);
  scene.logoText.x = rightColCX;
  scene.logoText.y = compY;
  app.stage.addChild(scene.logoText);

  // ─── CELLS (invisible hit areas for future interactivity) ──────────────────
  // The frame image has the cells baked in visually. We still compute their
  // logical positions for future game logic.
  // Frame-local cell layout (proportions of frame image):
  //   The grid inside the frame occupies roughly the top 90% of the image,
  //   centered horizontally with small padding. Compute an approximate grid
  //   rect inside the frame sprite so future code can place symbols on cells.
  // Inner-grid margins measured against the baked-in cells inside frame.png
  // (968×810). Tuned so flowers land centered on their visible cell squares.
  const FRAME_INNER_PAD_X      = 0.030;
  const FRAME_INNER_PAD_TOP    = 0.037;
  const FRAME_INNER_PAD_BOTTOM = 0.045;
  const innerX = compX + frameW * FRAME_INNER_PAD_X;
  const innerY = compY + frameH * FRAME_INNER_PAD_TOP;
  const innerW = frameW * (1 - FRAME_INNER_PAD_X * 2);
  const innerH = frameH * (1 - FRAME_INNER_PAD_TOP - FRAME_INNER_PAD_BOTTOM);
  const cellGap = frameW * 0.008;   // ~0.8% of frame width between cells
  const cellSize = Math.min(
    (innerW - (COLS - 1) * cellGap) / COLS,
    (innerH - (ROWS - 1) * cellGap) / ROWS
  );
  const gridW = COLS * cellSize + (COLS - 1) * cellGap;
  const gridH = ROWS * cellSize + (ROWS - 1) * cellGap;
  const gridX = innerX + (innerW - gridW) / 2;
  // Hard-coded upward nudge: the frame image has a 3D depth section at the
  // bottom that's part of the border, not a cell. Lifting the symbol layer by
  // ~100 design-pixels sits flowers on the top face of each cell.
  const SYMBOL_Y_NUDGE = 20 * gameScale;
  const gridY = innerY + (innerH - gridH) / 2 - SYMBOL_Y_NUDGE;

  for (let row = 0; row < ROWS; row++) {
    scene.cells[row] = [];
    for (let col = 0; col < COLS; col++) {
      scene.cells[row][col] = {
        x: gridX + col * (cellSize + cellGap),
        y: gridY + row * (cellSize + cellGap),
        w: cellSize,
        h: cellSize,
      };
    }
  }

  // ─── FLOWER SYMBOLS (live grid) ────────────────────────────────────────────
  // Generate once on first build; re-use the same grid on resize so we don't
  // "spin" every time the window changes.
  if (!currentGrid) currentGrid = generateGrid();

  scene.flowerLayer = new PIXI.Container();
  scene.flowers = [];
  for (let row = 0; row < ROWS; row++) {
    scene.flowers[row] = [];
    for (let col = 0; col < COLS; col++) {
      const rect = scene.cells[row][col];
      const data = currentGrid[row][col];
      const flower = new FlowerSymbol(data.color, data.petals, cellSize);
      flower.x = rect.x + rect.w / 2;
      flower.y = rect.y + rect.h / 2;
      scene.flowerLayer.addChild(flower);
      scene.flowers[row][col] = flower;
    }
  }
  // Flowers sit on top of the frame image.
  app.stage.addChild(scene.flowerLayer);

  // ─── CELL TINT LAYER (alt-2 only) ──────────────────────────────────────
  // A soft gold overlay painted on cells that currently hold a multiplier.
  // Sits BEHIND the flower layer so flowers render over it.
  scene.cellTintLayer = new PIXI.Container();
  scene.cellTints = [];
  for (let r = 0; r < ROWS; r++) {
    scene.cellTints[r] = [];
    for (let c = 0; c < COLS; c++) scene.cellTints[r][c] = null;
  }
  // Layer order (back to front): cellTintLayer → cellMultTextLayer →
  // flowerLayer. The big multiplier text renders OVER the tint and UNDER
  // the pot so the pot stays readable on top.
  const flowerLayerIdx = app.stage.getChildIndex(scene.flowerLayer);
  app.stage.addChildAt(scene.cellTintLayer, flowerLayerIdx);

  // ─── CELL MULT TEXT LAYER (alt-2 only) ──────────────────────────────────
  // Big multiplier value drawn behind the pot on every multiplied cell.
  scene.cellMultTextLayer = new PIXI.Container();
  scene.cellMultTexts = [];
  for (let r = 0; r < ROWS; r++) {
    scene.cellMultTexts[r] = [];
    for (let c = 0; c < COLS; c++) scene.cellMultTexts[r][c] = null;
  }
  // Insert between tintLayer and flowerLayer.
  const flowerLayerIdx2 = app.stage.getChildIndex(scene.flowerLayer);
  app.stage.addChildAt(scene.cellMultTextLayer, flowerLayerIdx2);

  // ─── TILE BADGE LAYER (alt-2 only) ─────────────────────────────────────
  // A 2-D grid of small multiplier badges rendered on top of each cell.
  // Each entry is either null (no tile) or a PIXI.Container for that cell.
  scene.tileBadgeLayer = new PIXI.Container();
  scene.tileBadges = [];
  for (let r = 0; r < ROWS; r++) {
    scene.tileBadges[r] = [];
    for (let c = 0; c < COLS; c++) scene.tileBadges[r][c] = null;
  }
  app.stage.addChild(scene.tileBadgeLayer);

  // If we're mid-feature and the scene is being rebuilt (resize, mode swap
  // — though the mode swap is blocked during the feature), restore the
  // accumulated tile multipliers so they survive the rebuild. This also
  // redraws the cell tints behind the flowers via setCellTileBadge.
  if (ALT_MODE === 'alt2' && player.feature.active && player.feature.cellMults) {
    const cm = player.feature.cellMults;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (cm[r][c] > 0) setCellTileBadge(r, c, cm[r][c], { skipEntry: true });
      }
    }
  }

  // Grid mask — anything drawn to flowerLayer outside the cell grid area is
  // hidden. Symbols spawning above the grid or falling out the bottom are
  // clipped so the player only sees them inside the playing field.
  const gridLeft   = scene.cells[0][0].x;
  const gridTop    = scene.cells[0][0].y;
  const gridRight  = scene.cells[0][COLS - 1].x + scene.cells[0][COLS - 1].w;
  const gridBottom = scene.cells[ROWS - 1][0].y + scene.cells[ROWS - 1][0].h;
  scene.gridMask = new PIXI.Graphics();
  scene.gridMask.beginFill(0xFFFFFF);
  scene.gridMask.drawRect(
    gridLeft, gridTop,
    gridRight - gridLeft, gridBottom - gridTop
  );
  scene.gridMask.endFill();
  app.stage.addChild(scene.gridMask);
  scene.flowerLayer.mask = scene.gridMask;

  // Cache grid bounds so animators can use them (spawn above, fall below).
  scene.gridBounds = {
    left: gridLeft, top: gridTop,
    right: gridRight, bottom: gridBottom,
    w: gridRight - gridLeft, h: gridBottom - gridTop,
  };

  // FX layer is ABOVE flowers and NOT masked — in-flight petals, sparkles,
  // and payout text must be visible outside the grid (e.g. sparkles flying
  // up to the multiplier bar).
  scene.fxLayer = new PIXI.Container();
  app.stage.addChild(scene.fxLayer);

  // ─── BALANCE / BET / WIN PILLS ─────────────────────────────────────────────
  //
  //   [ Balance ]     [ Bet ]     [ Win ]
  //             [  SPIN BUTTON  ]
  //
  // Pills are drawn inline with PIXI.Graphics + labels/values above/below.
  // The Bet pill is interactive — click cycles through betLevels.
  const _pillW    = 210 * gameScale;
  const _pillH    =  58 * gameScale;
  const _pillGap  =  14 * gameScale;
  const _adjR     = _pillH * 0.38;
  const _infoSize = _pillH * 1.05;
  const _winPillW = _pillW * 1.55;
  const btnTargetSize = 130 * gameScale;

  // UI row, all BOTTOM-aligned:
  //   [Info]  [Balance]  [WIN]  [– Bet +]  [Spin]
  // The FIELD GROUP — Balance, Win, Bet (with ± buttons) — is centred on the
  // canvas. Info sits to the left of Balance; Spin sits to the right of the
  // Bet group. All with _pillGap outside gaps.
  const _uiGapBelowGrid = 40 * gameScale;       // breathing room under the frame
  const UI_UP_PX        = 110 * gameScale;      // additional upward shift
  const pillsCenterY =
    compY + frameH + _uiGapBelowGrid +
    btnTargetSize - _pillH / 2 - UI_UP_PX;

  // Field group = Balance + gap + Win + gap + (–) + Bet + (+)
  const fieldGroupW =
    _pillW + _pillGap + _winPillW + _pillGap + _adjR + _pillW + _adjR;
  const fieldLeft  = (L.sw - fieldGroupW) / 2;
  const fieldRight = fieldLeft + fieldGroupW;

  const balanceCX = fieldLeft + _pillW / 2;
  const winCX     = balanceCX + _pillW / 2    + _pillGap + _winPillW / 2;
  const betCX     = winCX     + _winPillW / 2 + _pillGap + _adjR + _pillW / 2;
  const minusCX   = betCX - _pillW / 2;
  const plusCX    = betCX + _pillW / 2;

  const infoCX = fieldLeft  - _pillGap - _infoSize / 2;
  const spinCX = fieldRight + _pillGap + btnTargetSize / 2;

  const _rowStartX  = infoCX - _infoSize / 2;
  const pillsTotalW = (spinCX + btnTargetSize / 2) - _rowStartX;
  const pillsStartX = balanceCX;

  function makePill({ x, y, label, value, interactive, onClick, accent,
                      width, valueFontSize }) {
    const cont = new PIXI.Container();
    cont.x = x; cont.y = y;
    const pw = width || _pillW;

    const bg = new PIXI.Graphics();
    const drawBg = (hover = false) => {
      bg.clear();
      bg.lineStyle(2 * gameScale, accent || 0xC08050, 0.95);
      bg.beginFill(hover ? 0x3A2414 : 0x2A1808, 0.75);
      bg.drawRoundedRect(-pw / 2, -_pillH / 2, pw, _pillH, _pillH * 0.32);
      bg.endFill();
    };
    drawBg();
    cont.addChild(bg);

    const lbl = new PIXI.Text(label, {
      fontFamily: FONT,
      fontSize: Math.max(10, 13 * gameScale),
      fill: accent || 0xD4A017,
      letterSpacing: 1.2,
    });
    lbl.anchor.set(0.5);
    lbl.y = -_pillH * 0.24;
    cont.addChild(lbl);

    const val = new PIXI.Text(value, {
      fontFamily: FONT,
      fontSize: valueFontSize || Math.max(16, 26 * gameScale),
      fill: 0xFFECB3,
    });
    val.anchor.set(0.5);
    val.y = _pillH * 0.13;
    cont.addChild(val);

    if (interactive) {
      cont.eventMode = 'static';
      cont.cursor = 'pointer';
      cont.hitArea = new PIXI.RoundedRectangle(
        -pw / 2, -_pillH / 2, pw, _pillH, _pillH * 0.32
      );
      cont.on('pointerover', () => {
        drawBg(true);
        gsap.to(cont.scale, { x: 1.03, y: 1.03, duration: 0.12, ease: 'sine.out' });
      });
      cont.on('pointerout', () => {
        drawBg(false);
        gsap.to(cont.scale, { x: 1, y: 1, duration: 0.12 });
      });
      cont.on('pointertap', onClick || (() => {}));
    }

    cont.valText = val;
    cont.labelText = lbl;
    cont.redrawBg = drawBg;
    return cont;
  }

  // Split pill with two halves (WIN / Avalanche and MULTIPLIER). Historically
  // had an expand/collapse animation; the Avalanche pill at the top of the
  // grid is created with `permanent: true` so both halves are always visible
  // and the greeting sub-element is skipped.
  function makeSplitPill({ x, y, width, height, leftLabel, rightLabel,
                           leftValue, rightValue, leftAccent, rightAccent,
                           permanent = false,
                           valueFontSize, labelFontSize }) {
    const cont = new PIXI.Container();
    cont.x = x; cont.y = y;
    const pw = width;
    const ph = height || _pillH;    // local pill height (may be overridden)

    // Outer background + border
    const bg = new PIXI.Graphics();
    bg.lineStyle(2 * gameScale, 0xC08050, 0.95);
    bg.beginFill(0x2A1808, 0.75);
    bg.drawRoundedRect(-pw / 2, -ph / 2, pw, ph, ph * 0.32);
    bg.endFill();
    cont.addChild(bg);

    // Vertical divider (visible when expanded).
    const divider = new PIXI.Graphics();
    divider.lineStyle(1.5 * gameScale, 0xC08050, 0.55);
    divider.moveTo(0, -ph * 0.34);
    divider.lineTo(0,  ph * 0.34);
    divider.alpha = permanent ? 1 : 0;
    cont.addChild(divider);

    // ── MULTIPLIER PROGRESS BAR ───────────────────────────────────────────
    // Covers the entire right (MULTIPLIER) half of the pill with a soft,
    // low-opacity fill that grows left → right as empty dissolves accumulate
    // toward the next tier. Sits over the pill bg but under the label/value
    // texts (and under flying pots, which reparent in front of rightValText).
    // A mask clips the fill to the pill's rounded shape.
    const barMask = new PIXI.Graphics();
    barMask.beginFill(0xFFFFFF);
    barMask.drawRoundedRect(-pw / 2, -ph / 2, pw, ph, ph * 0.32);
    barMask.endFill();
    cont.addChild(barMask);

    const barFill = new PIXI.Graphics();
    barFill.mask = barMask;
    barFill.alpha = permanent ? 1 : 0; // visible right away for permanent pill
    cont.addChild(barFill);

    // barState carries three independently animated values:
    //   p          — fill proportion (0–1), drives how wide the bar is
    //   glow       — alpha of a brighter overlay on top of the fill region;
    //                pulses on every pot-hit so each landing feels punchy
    //   flash      — alpha of a full-right-half white flash; peaks at tier
    //                advance moments to really sell the "just levelled up!"
    const barState = { p: 0, glow: 0, flash: 0 };
    const BAR_FILL_COLOR  = 0xFFE6A0;   // base warm amber
    const BAR_FILL_ALPHA  = 0.22;       // low opacity wash (resting state)
    const BAR_GLOW_COLOR  = 0xFFF2C2;   // brighter amber for the pulse
    const BAR_FLASH_COLOR = 0xFFFFFF;   // pure white tier-advance flash
    const redrawBar = () => {
      barFill.clear();
      const p = Math.max(0, Math.min(1, barState.p));
      const w = (pw / 2) * p;
      if (w > 0.5) {
        // Base fill — the always-on soft wash.
        barFill.beginFill(BAR_FILL_COLOR, BAR_FILL_ALPHA);
        barFill.drawRect(0, -ph / 2, w, ph);
        barFill.endFill();
        // Glow overlay — a brighter layer on top of the fill that pulses
        // briefly on each pot hit so the fill visibly "charges up".
        if (barState.glow > 0.01) {
          barFill.beginFill(BAR_GLOW_COLOR, barState.glow);
          barFill.drawRect(0, -ph / 2, w, ph);
          barFill.endFill();
        }
      }
      // Full-right-half flash — covers the whole bar area regardless of
      // current progress; used for tier-advance so the advancement reads
      // as a big event, not just a bar-wipe.
      if (barState.flash > 0.01) {
        barFill.beginFill(BAR_FLASH_COLOR, barState.flash);
        barFill.drawRect(0, -ph / 2, pw / 2, ph);
        barFill.endFill();
      }
    };
    redrawBar();

    const COLLAPSED_LEFT_CX =  0;       // Win centred when collapsed
    const EXPANDED_LEFT_CX  = -pw / 4;  // Win in left half when expanded
    const EXPANDED_RIGHT_CX =  pw / 4;  // Mult in right half when expanded
    const labelFs = labelFontSize || Math.max(10, 12 * gameScale);
    const valueFs = valueFontSize || Math.max(16, 24 * gameScale);

    // Starting x for each half: permanent pills open expanded; non-permanent
    // start with WIN centred and MULTIPLIER tucked to the right (alpha 0).
    const leftStartX  = permanent ? EXPANDED_LEFT_CX  : COLLAPSED_LEFT_CX;
    const rightStartX = EXPANDED_RIGHT_CX;
    const rightStartA = permanent ? 1 : 0;

    function half(startX, label, value, accent, startAlpha) {
      const lbl = new PIXI.Text(label, {
        fontFamily: FONT, fontSize: labelFs,
        fill: accent, letterSpacing: 1.2,
      });
      lbl.anchor.set(0.5);
      lbl.x = startX; lbl.y = -ph * 0.25;
      lbl.alpha = startAlpha;
      cont.addChild(lbl);

      const val = new PIXI.Text(value, {
        fontFamily: FONT, fontSize: valueFs, fill: 0xFFECB3,
      });
      val.anchor.set(0.5);
      val.x = startX; val.y = ph * 0.14;
      val.alpha = startAlpha;
      cont.addChild(val);
      return { lbl, val };
    }

    const L = half(leftStartX,  leftLabel,  leftValue,  leftAccent  || 0xD4A017, 1);
    const R = half(rightStartX, rightLabel, rightValue, rightAccent || 0xD4A017, rightStartA);

    // Legacy greeting element — only created for non-permanent pills. Code
    // that references cont.greeting must tolerate null.
    let greeting = null;
    if (!permanent) {
      greeting = new PIXI.Text('Good luck!', {
        fontFamily: FONT,
        fontSize: Math.max(18, 28 * gameScale),
        fill: 0xFFECB3,
        letterSpacing: 0.5,
      });
      greeting.anchor.set(0.5);
      greeting.x = 0;
      greeting.y = 0;
      greeting.alpha = 0;
      cont.addChild(greeting);
    }

    cont.leftLabel    = L.lbl;  cont.leftValText  = L.val;
    cont.rightLabel   = R.lbl;  cont.rightValText = R.val;
    cont.divider      = divider;
    cont.greeting     = greeting;
    cont.isExpanded   = !!permanent;  // permanent pills start expanded
    cont.permanent    = !!permanent;
    cont.multBar = { mask: barMask, fill: barFill, state: barState, redraw: redrawBar };

    // Move the bar to a specific fill proportion (0–1).
    //   default        — snap instantly (used on pot-landing inside a tier)
    //   animate: true  — short ease (used on resets)
    //   tierAdvance    — pot-landing that crossed a tier threshold: ease up
    //                    to FULL first, hold, then snap to 0 and ease to the
    //                    new (lower) progress. This avoids the visual pop
    //                    where a near-full bar jumps "backwards" to low.
    // Helper: pulse the glow overlay briefly. Peak amplitude controls the
    // punch; the fall-off is always a quick ease-out.
    const pulseGlow = (peak = 0.55, fallMs = 350) => {
      if (cont._barGlowTween) { cont._barGlowTween.kill(); cont._barGlowTween = null; }
      barState.glow = peak;
      redrawBar();
      cont._barGlowTween = gsap.to(barState, {
        glow: 0,
        duration: fallMs / 1000,
        ease: 'power2.out',
        onUpdate: redrawBar,
        onComplete: () => { cont._barGlowTween = null; },
      });
    };

    // Safety net: ensure no prior animation has left flash/glow/p in a
    // partial state. Called at the top of every setMultiplierProgress so a
    // killed tier-advance (which may have skipped its snap-to-0 and/or
    // flash fade-out) can't paint the bar with a permanent white wash.
    const cleanupBarAnimationState = ({ resetP = false } = {}) => {
      barState.flash = 0;
      barState.glow  = 0;
      if (resetP) barState.p = 0;
    };

    cont.setMultiplierProgress = (progress, { animate = false, tierAdvance = false } = {}) => {
      progress = Math.max(0, Math.min(1, progress || 0));
      if (cont._barProgressTween) { cont._barProgressTween.kill(); cont._barProgressTween = null; }

      if (tierAdvance) {
        // Big choreographed advance: charge to 100% with rising glow, explode
        // in a full white flash, reset, then ease into the new (low) progress.
        if (cont._barGlowTween)  { cont._barGlowTween.kill();  cont._barGlowTween  = null; }
        if (cont._barFlashTween) { cont._barFlashTween.kill(); cont._barFlashTween = null; }
        const tl = gsap.timeline({
          onUpdate: redrawBar,
          onComplete: () => {
            cont._barProgressTween = null;
            cont._barGlowTween     = null;
            cont._barFlashTween    = null;
          },
          // If the timeline is killed mid-flight (e.g. the next pot lands
          // before we got to the snap-to-0 / flash fade-out), manually
          // restore clean state — otherwise the bar stays painted white
          // indefinitely because the interrupted tween never got to fade
          // flash back to 0.
          onInterrupt: () => {
            barState.flash = 0;
            barState.glow  = 0;
            // If we were still in the fill phase (p hasn't snapped yet),
            // force the reset the timeline was supposed to do. Otherwise
            // leave p as-is — the caller's next action will set it.
            if (barState.p > 0.05) barState.p = 0;
            redrawBar();
          },
        });
        // 1) Charge: sweep p to full, glow ramping from current to strong.
        tl.to(barState, { p: 1,       duration: 0.24, ease: 'power2.out' }, 0);
        tl.to(barState, { glow: 0.9,  duration: 0.24, ease: 'power2.out' }, 0);
        // 2) Detonate: white flash peaks just as p hits 1.
        tl.to(barState, { flash: 1.0, duration: 0.10, ease: 'power2.out' }, 0.22);
        // 3) Snap p to 0 mid-flash (covered by the white wash so no visual pop).
        tl.call(() => { barState.p = 0; redrawBar(); }, null, 0.30);
        // 4) Decay the flash + glow while the bar begins filling to new level.
        tl.to(barState, { flash: 0,   duration: 0.38, ease: 'power2.in'  }, 0.32);
        tl.to(barState, { glow: 0,    duration: 0.32, ease: 'power2.in'  }, 0.32);
        tl.to(barState, { p: progress, duration: 0.24, ease: 'power2.out' }, 0.36);
        cont._barProgressTween = tl;
      } else if (animate) {
        cleanupBarAnimationState();
        cont._barProgressTween = gsap.to(barState, {
          p: progress, duration: 0.18, ease: 'power2.out',
          onUpdate: redrawBar,
          onComplete: () => { cont._barProgressTween = null; },
        });
      } else {
        // Normal pot hit within a tier — snap the fill width, but pulse the
        // glow overlay on top so each landing has visible impact instead of
        // just a silent width change.
        cleanupBarAnimationState();
        barState.p = progress;
        redrawBar();
        pulseGlow(0.55, 380);
      }
    };

    // Instantly hide the progress bar (used when the win + multiplier merge
    // animation begins — the bar shouldn't compete with the merge visuals).
    cont.hideMultiplierBar = (animate = false) => {
      if (cont._barProgressTween) { cont._barProgressTween.kill(); cont._barProgressTween = null; }
      if (cont._barGlowTween)     { cont._barGlowTween.kill();     cont._barGlowTween     = null; }
      if (cont._barFlashTween)    { cont._barFlashTween.kill();    cont._barFlashTween    = null; }
      barState.glow = 0;
      barState.flash = 0;
      if (animate) {
        gsap.to(barFill, { alpha: 0, duration: 0.15, ease: 'power2.in' });
      } else {
        barFill.alpha = 0;
      }
      redrawBar();
    };

    cont.expand = () => {
      if (cont.isExpanded) return;
      cont.isExpanded = true;
      const dur = T(0.40);
      gsap.to(L.lbl, { x: EXPANDED_LEFT_CX, duration: dur, ease: 'power2.out' });
      gsap.to(L.val, { x: EXPANDED_LEFT_CX, duration: dur, ease: 'power2.out' });
      gsap.to(divider, { alpha: 1, duration: T(0.30), ease: 'power2.out' });
      // Right half: fade in with a tiny slide from further right for zing
      gsap.fromTo(R.lbl,
        { x: EXPANDED_RIGHT_CX + pw * 0.08, alpha: 0 },
        { x: EXPANDED_RIGHT_CX, alpha: 1, duration: dur, delay: T(0.10), ease: 'back.out(1.6)' });
      gsap.fromTo(R.val,
        { x: EXPANDED_RIGHT_CX + pw * 0.08, alpha: 0 },
        { x: EXPANDED_RIGHT_CX, alpha: 1, duration: dur, delay: T(0.10), ease: 'back.out(1.6)' });
      // Multiplier progress bar fades in along with the right half.
      gsap.to(barFill, { alpha: 1, duration: dur, delay: T(0.10), ease: 'power2.out' });
    };

    // Restore the permanent pill to fresh-spin visuals: both halves fully
    // visible at their expanded positions, divider on, bar reset. Used at
    // the start of each spin to undo anything animateMultiplication did.
    cont.resetPermanent = () => {
      if (!permanent) return;
      gsap.killTweensOf(L.lbl); gsap.killTweensOf(L.lbl.scale);
      gsap.killTweensOf(L.val); gsap.killTweensOf(L.val.scale);
      gsap.killTweensOf(R.lbl); gsap.killTweensOf(R.lbl.scale);
      gsap.killTweensOf(R.val); gsap.killTweensOf(R.val.scale);
      gsap.killTweensOf(divider);
      gsap.killTweensOf(barFill);
      // Restore the left label text — the merge animation shrinks it down
      // to "WIN" once the multiplier has been consumed; fresh spins start
      // with the full pre-merge label (e.g. "BLOOM WIN").
      L.lbl.text = leftLabel;
      L.lbl.x = EXPANDED_LEFT_CX;  L.lbl.alpha = 1; L.lbl.scale.set(1);
      L.val.x = EXPANDED_LEFT_CX;  L.val.alpha = 1; L.val.scale.set(1);
      R.lbl.x = EXPANDED_RIGHT_CX; R.lbl.alpha = 1; R.lbl.scale.set(1);
      R.val.x = EXPANDED_RIGHT_CX; R.val.alpha = 1; R.val.scale.set(1);
      divider.alpha = 1;
      barFill.alpha = 1;
      if (cont._barProgressTween) { cont._barProgressTween.kill(); cont._barProgressTween = null; }
      if (cont._barGlowTween)     { cont._barGlowTween.kill();     cont._barGlowTween     = null; }
      if (cont._barFlashTween)    { cont._barFlashTween.kill();    cont._barFlashTween    = null; }
      barState.p = 0;
      barState.glow = 0;
      barState.flash = 0;
      redrawBar();
    };

    cont.collapse = () => {
      // Permanent pills (Avalanche header) never collapse — skip silently.
      if (permanent) return;
      if (!cont.isExpanded) return;
      cont.isExpanded = false;
      const dur = T(0.35);
      gsap.to(L.lbl, { x: COLLAPSED_LEFT_CX, duration: dur, ease: 'power2.out' });
      gsap.to(L.val, { x: COLLAPSED_LEFT_CX, duration: dur, ease: 'power2.out' });
      gsap.to(divider, { alpha: 0, duration: T(0.25), ease: 'power2.in' });
      gsap.to(R.lbl, { alpha: 0, duration: T(0.25), ease: 'power2.in' });
      gsap.to(R.val, { alpha: 0, duration: T(0.25), ease: 'power2.in' });
      // Hide the progress bar when collapsing back to WIN-only.
      gsap.to(barFill, { alpha: 0, duration: T(0.25), ease: 'power2.in',
        onComplete: () => {
          // Reset bar state so the next spin starts from empty.
          if (cont._barProgressTween) { cont._barProgressTween.kill(); cont._barProgressTween = null; }
          if (cont._barGlowTween)     { cont._barGlowTween.kill();     cont._barGlowTween     = null; }
          if (cont._barFlashTween)    { cont._barFlashTween.kill();    cont._barFlashTween    = null; }
          barState.p = 0;
          barState.glow = 0;
          barState.flash = 0;
          redrawBar();
        }
      });
      // Once the pill has settled into the centred WIN-only layout, swap
      // back to the "Good luck!" greeting if the current win is 0.
      gsap.delayedCall(dur, () => {
        if ((player.displayedWin || 0) <= 0) setGreetingVisible(true, true);
      });
    };

    return cont;
  }

  scene.balancePill = makePill({
    x: balanceCX,
    y: pillsCenterY,
    label: 'BALANCE',
    value: fmtCurrency(player.balance),
    accent: 0xFFD700,
  });
  app.stage.addChild(scene.balancePill);

  // Bet pill is non-interactive; the adjust buttons next to it handle input.
  scene.betPill = makePill({
    x: betCX,
    y: pillsCenterY,
    label: 'BET',
    value: fmtCurrency(player.bet),
    accent: 0xFFAB40,
  });
  app.stage.addChild(scene.betPill);

  // Adjust buttons: circular minus on the left, plus on the right.
  function makeAdjustButton(symbol, onTap) {
    const r = _pillH * 0.38;
    const cont = new PIXI.Container();
    const face = new PIXI.Graphics();
    const drawFace = (hover) => {
      face.clear();
      face.lineStyle(2 * gameScale, 0xC08050, 1);
      face.beginFill(hover ? 0x5C3318 : 0x3D1C02, 0.95);
      face.drawCircle(0, 0, r);
      face.endFill();
    };
    drawFace(false);
    cont.addChild(face);

    const txt = new PIXI.Text(symbol, {
      fontFamily: FONT,
      fontSize: r * 1.3,
      fill: 0xFFECB3,
    });
    txt.anchor.set(0.5);
    txt.y = -r * 0.08;
    cont.addChild(txt);

    cont.eventMode = 'static';
    cont.cursor = 'pointer';
    cont.hitArea = new PIXI.Circle(0, 0, r);
    cont.on('pointerover', () => {
      drawFace(true);
      gsap.to(cont.scale, { x: 1.08, y: 1.08, duration: 0.1, ease: 'sine.out' });
    });
    cont.on('pointerout', () => {
      drawFace(false);
      gsap.to(cont.scale, { x: 1, y: 1, duration: 0.1 });
    });
    cont.on('pointerdown', () => gsap.to(cont.scale, { x: 0.92, y: 0.92, duration: 0.06 }));
    cont.on('pointerup', () => gsap.to(cont.scale, { x: 1.08, y: 1.08, duration: 0.1 }));
    cont.on('pointerupoutside', () => gsap.to(cont.scale, { x: 1, y: 1, duration: 0.1 }));
    cont.on('pointertap', () => {
      if (scene.spinButton.busy) return;
      onTap();
      gsap.fromTo(scene.betPill.valText.scale,
        { x: 1.2, y: 1.2 }, { x: 1, y: 1, duration: 0.3, ease: 'back.out(2)' });
    });
    return cont;
  }

  scene.betMinusBtn = makeAdjustButton('\u2212', () => cycleBet(-1));
  scene.betMinusBtn.x = minusCX;
  scene.betMinusBtn.y = pillsCenterY;
  app.stage.addChild(scene.betMinusBtn);

  scene.betPlusBtn = makeAdjustButton('+', () => cycleBet(+1));
  scene.betPlusBtn.x = plusCX;
  scene.betPlusBtn.y = pillsCenterY;
  app.stage.addChild(scene.betPlusBtn);

  // ─── AVALANCHE PILL (top of grid, permanent) ────────────────────────────
  // Large split pill that sits at the top of the grid, overlapping the grid
  // by 25% of its own height. Shows running Avalanche total + multiplier
  // across the whole spin. Stays visible permanently (both halves always on).
  const avalanchePillW = Math.min(frameW * 0.78, 640 * gameScale);
  const avalanchePillH = Math.max(36, 46 * gameScale) + 20 * gameScale;
  // Pill center Y so the pill overlaps the grid by 25% of its own height:
  //   pill bottom = gridTop + 0.25 * pillH
  //   pill centerY = pill bottom - pillH/2 = gridTop - 0.25 * pillH
  const avalancheCY = gridTop - 0.25 * avalanchePillH;
  const avalancheCX = (gridLeft + gridRight) / 2;
  // The top "Bloom Win / Multiplier" pill is only used in Alt-1 (chain-
  // multiplier mode). Alt-2 (tile-multiplier mode) multiplies per-bloom and
  // counts running wins in the bottom status text instead.
  if (ALT_MODE === 'alt1') {
    scene.winPill = makeSplitPill({
      x: avalancheCX,
      y: avalancheCY,
      width: avalanchePillW,
      height: avalanchePillH,
      leftLabel:  'BLOOM WIN',
      leftValue:  fmtCurrency(0),
      leftAccent: 0x7FE080,        // green for the win side
      rightLabel: 'MULTIPLIER',
      rightValue: '\u2013',
      rightAccent: 0xFFD700,       // gold for the multiplier side
      permanent:  true,
      labelFontSize: Math.max(14, 17 * gameScale),
      valueFontSize: Math.max(22, 34 * gameScale),
    });
    app.stage.addChild(scene.winPill);
  } else {
    scene.winPill = null;
  }

  // ─── MECHANIC BUTTONS (top-right) ────────────────────────────────────────
  // Two separate buttons for the two mechanics — the active one is shown
  // highlighted, the inactive one dimmed. Clicking the inactive one switches
  // modes and rebuilds the scene. Disabled while a spin is in flight.
  {
    const btnW = Math.max(150, 190 * gameScale);
    const btnH = Math.max(38, 48 * gameScale);
    const gap  = 10 * gameScale;
    // Right-align the pair, with a 24px margin from the right edge.
    const rightEdge = L.sw - 24 * gameScale;
    const topY      = btnH / 2 + 24 * gameScale;

    function makeMechanicButton(mode, label, cx) {
      const cont = new PIXI.Container();
      cont.x = cx; cont.y = topY;

      const bg   = new PIXI.Graphics();
      const text = new PIXI.Text(label, {
        fontFamily: FONT,
        fontSize: Math.max(13, 15 * gameScale),
        fill: 0xFFECB3,
        letterSpacing: 0.4,
      });
      text.anchor.set(0.5);
      cont.addChild(bg);
      cont.addChild(text);

      const drawBg = (hover) => {
        const active = (ALT_MODE === mode);
        bg.clear();
        const stroke = active ? 0xFFD54F : 0xC08050;
        const strokeA = active ? 1 : 0.6;
        const fill = active ? 0x5C3318 : 0x2A1808;
        const fillA = hover ? 1 : (active ? 0.95 : 0.75);
        bg.lineStyle((active ? 2.5 : 1.5) * gameScale, stroke, strokeA);
        bg.beginFill(fill, fillA);
        bg.drawRoundedRect(-btnW / 2, -btnH / 2, btnW, btnH, btnH * 0.35);
        bg.endFill();
      };
      const renderText = () => {
        const active = (ALT_MODE === mode);
        text.style.fill = active ? 0xFFD54F : 0xE8D5B0;
        text.alpha = active ? 1 : 0.7;
      };

      cont._redraw = () => { drawBg(false); renderText(); };
      cont._redraw();

      cont.eventMode = 'static';
      cont.cursor = 'pointer';
      cont.hitArea = new PIXI.RoundedRectangle(-btnW / 2, -btnH / 2, btnW, btnH, btnH * 0.35);
      cont.on('pointerover', () => {
        if (scene.spinButton && scene.spinButton.busy) return;
        if (ALT_MODE === mode) return;
        drawBg(true);
        gsap.to(cont.scale, { x: 1.04, y: 1.04, duration: 0.12, ease: 'sine.out' });
      });
      cont.on('pointerout', () => {
        drawBg(false);
        gsap.to(cont.scale, { x: 1, y: 1, duration: 0.12 });
      });
      cont.on('pointertap', () => {
        if (scene.spinButton && scene.spinButton.busy) return;
        if (player.feature.active) return;   // locked during free spins
        if (ALT_MODE === mode) return;       // already active — no-op
        setAltMode(mode);
        rebuild();                           // redraws everything for the new mode
      });

      return cont;
    }

    // Right-to-left: Tile Multiplier (rightmost), then Chain Multiplier.
    const tileCX  = rightEdge - btnW / 2;
    const chainCX = tileCX - btnW - gap;

    scene.chainBtn = makeMechanicButton('alt1', 'Chain Multiplier', chainCX);
    scene.tileBtn  = makeMechanicButton('alt2', 'Tile Multiplier',  tileCX);
    app.stage.addChild(scene.chainBtn);
    app.stage.addChild(scene.tileBtn);
  }

  // ─── BUY FEATURE BUTTON + FREE-SPINS BANNER (alt-2 only) ────────────────
  // Square button sitting to the LEFT of the grid, aligned to the grid's
  // top edge. Opens a confirmation modal; on confirm, kicks off the
  // 15-free-spin feature where tile multipliers accumulate across spins.
  if (ALT_MODE === 'alt2') {
    const bfSize = Math.max(120, 140 * gameScale);
    const bfW = bfSize;
    const bfH = bfSize;
    // Position: left of grid, top-aligned with grid top. Center of the
    // button is placed so the button's right edge sits ~24px left of the
    // grid's left edge (or at the left edge of the canvas if that would
    // clip off-screen).
    const gridLeftEdge = scene.gridBounds.left;
    const leftGap = 24 * gameScale;
    let bfX = gridLeftEdge - leftGap - bfW / 2;
    if (bfX - bfW / 2 < 8 * gameScale) bfX = bfW / 2 + 8 * gameScale;
    const bfY = scene.gridBounds.top + bfH / 2;

    const buyCont = new PIXI.Container();
    buyCont.x = bfX; buyCont.y = bfY;

    const buyBg = new PIXI.Graphics();
    // Three-line centred layout for the square button: BUY / FEATURE / price.
    const buyLineTop = new PIXI.Text('BUY', {
      fontFamily: FONT,
      fontSize: Math.max(14, 17 * gameScale),
      fill: 0xFFECB3,
      letterSpacing: 0.6,
    });
    buyLineTop.anchor.set(0.5);
    buyLineTop.y = -bfH * 0.28;
    const buyLineMid = new PIXI.Text('FEATURE', {
      fontFamily: FONT,
      fontSize: Math.max(14, 17 * gameScale),
      fill: 0xFFECB3,
      letterSpacing: 0.6,
    });
    buyLineMid.anchor.set(0.5);
    buyLineMid.y = -bfH * 0.07;
    const priceLbl = new PIXI.Text('', {
      fontFamily: FONT,
      fontSize: Math.max(16, 22 * gameScale),
      fill: 0xFFD54F,
    });
    priceLbl.anchor.set(0.5);
    priceLbl.y = bfH * 0.22;
    buyCont.addChild(buyBg);
    buyCont.addChild(buyLineTop);
    buyCont.addChild(buyLineMid);
    buyCont.addChild(priceLbl);

    const drawBuyBg = (hover) => {
      const enabled = canBuyFeature() && !(scene.spinButton && scene.spinButton.busy);
      buyBg.clear();
      const stroke = enabled ? 0xFFD54F : 0xC08050;
      const strokeA = enabled ? 1 : 0.45;
      const fill = enabled ? (hover ? 0x7A3E16 : 0x5C2E10) : 0x2A1808;
      const fillA = enabled ? (hover ? 1 : 0.95) : 0.5;
      buyBg.lineStyle((enabled ? 2.5 : 1.5) * gameScale, stroke, strokeA);
      buyBg.beginFill(fill, fillA);
      buyBg.drawRoundedRect(-bfW / 2, -bfH / 2, bfW, bfH, bfH * 0.3);
      buyBg.endFill();
    };
    const refreshBuy = () => {
      const enabled = canBuyFeature() && !(scene.spinButton && scene.spinButton.busy);
      const visible = !player.feature.active;
      buyCont.visible = visible;
      buyCont.eventMode = visible && enabled ? 'static' : 'none';
      buyCont.cursor    = visible && enabled ? 'pointer' : 'default';
      priceLbl.text = fmtCurrency(featureCost());
      buyLineTop.alpha = enabled ? 1 : 0.55;
      buyLineMid.alpha = enabled ? 1 : 0.55;
      priceLbl.alpha   = enabled ? 1 : 0.55;
      drawBuyBg(false);
    };

    buyCont.hitArea = new PIXI.RoundedRectangle(-bfW / 2, -bfH / 2, bfW, bfH, bfH * 0.3);
    buyCont.on('pointerover', () => {
      if (!canBuyFeature() || (scene.spinButton && scene.spinButton.busy)) return;
      drawBuyBg(true);
      gsap.to(buyCont.scale, { x: 1.04, y: 1.04, duration: 0.12, ease: 'sine.out' });
    });
    buyCont.on('pointerout', () => {
