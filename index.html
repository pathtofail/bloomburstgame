// ═══════════════════════════════════════════════════════════════════════════════
// SCENE BUILDER
// ═══════════════════════════════════════════════════════════════════════════════
const scene = {
  bg: null,
  logoText: null,
  frame: null,
  multiplier: null,
  multiplierFill: null,
  multiplierMask: null,
  multiplierText: null,
  cells: [],
  flowers: [],
  flowerLayer: null,
  fxLayer: null,
  balancePill: null,
  betPill: null,
  winPill: null,
  rtpText: null,
  spinButton: null,
  infoButton: null,
  paytableModal: null,
  barItems: {},
};

// Persist current grid across resizes so we don't re-spin on every resize.
let currentGrid = null;
let animator = null;

let uiState = {
  multiplier: 1,
  multBarMaxEmpties: 10,
};

// ─── PLAYER STATE ───────────────────────────────────────────────────────────
const player = {
  balance: 10000,
  bet: 10,
  betLevels: [1, 2, 5, 10, 20, 50, 100, 200],
  betIndex: 3,          // starts at 10
  displayedWin: 0,      // last committed WIN value on screen
};

function canAffordSpin() {
  return player.balance >= player.bet;
}

function cycleBet(direction = +1) {
  player.betIndex = (player.betIndex + direction + player.betLevels.length) % player.betLevels.length;
  player.bet = player.betLevels[player.betIndex];
  updateBetText();
  updateSpinButtonState();
}

function roundedRectGraphics(x, y, w, h, r, fill, strokeColor, strokeWidth) {
  const g = new PIXI.Graphics();
  if (strokeColor !== undefined) g.lineStyle(strokeWidth, strokeColor, 1);
  g.beginFill(fill);
  g.drawRoundedRect(x, y, w, h, r);
  g.endFill();
  return g;
}

// Design reference — game composition was authored at 1920×1080
const DESIGN_W = 1920;
const DESIGN_H = 1080;

function buildScene(L) {
  app.stage.removeChildren();
  scene.cells = [];
  scene.barItems = {};

  // ─── BACKGROUND ────────────────────────────────────────────────────────────
  // Cover-width fit. The source image is portrait (2800×3600) with the pots
  // composition sitting around source y=1800–2200. Position the bg so that
  // this focal point lands near the bottom of the viewport at every window
  // size — that keeps the pots visible below the grid frame.
  scene.bg = new PIXI.Sprite(bgTexture);
  const bgScale = L.sw / bgTexture.width;
  scene.bg.scale.set(bgScale);
  scene.bg.x = 0;
  const BG_FOCAL_SOURCE_Y = 2200;      // bottom of the pot cluster in source
  const BG_FOCAL_SCREEN_FRAC = 0.95;   // where that point should land on screen
  scene.bg.y = L.sh * BG_FOCAL_SCREEN_FRAC - BG_FOCAL_SOURCE_Y * bgScale;
  app.stage.addChild(scene.bg);

  // ─── GAME SCALE ────────────────────────────────────────────────────────────
  // Scale the game composition relative to 1920×1080 design reference.
  // On larger screens, elements stay at their designed pixel size — more of the
  // background becomes visible around the composition.
  // On smaller screens, everything scales down uniformly.
  const gameScale = Math.min(L.sw / DESIGN_W, L.sh / DESIGN_H, 1.0);

  // Dimensions
  const frameW  = frameTexture.width * gameScale;
  const frameH  = frameTexture.height * gameScale;
  const multW   = multEmptyTexture.width * gameScale;
  const multH   = multEmptyTexture.height * gameScale;
  const logoScale = gameScale * 0.45;
  const logoW   = logoTexture.width * logoScale;
  const logoH   = logoTexture.height * logoScale;
  const gapX    = 24 * gameScale; // gap between frame and right column

  // Frame is centered horizontally; vertically placed so there's enough room
  // below for the UI row (pills + spin button + RTP line) without overlap.
  //   UI row budget at gameScale=1: 25 (gap) + 58 (pills) + 12 (gap) +
  //                                 130 (spin btn) + 20 (rtp margin) = 245
  // Frame top margin fills whatever's left above.
  const rightColW = Math.max(multW, logoW);
  const compX     = (L.sw - frameW) / 2;
  const UI_BELOW_BUDGET = 245 * gameScale;
  const compY     = Math.max(
    10 * gameScale,
    Math.min(
      (L.sh - frameH) / 2 - UI_BELOW_BUDGET / 2,  // vertical center, biased up
      L.sh - frameH - UI_BELOW_BUDGET             // never push UI off-screen
    )
  );

  // ─── FRAME (image w/ cells baked in) ───────────────────────────────────────
  scene.frame = new PIXI.Sprite(frameTexture);
  scene.frame.scale.set(gameScale);
  scene.frame.x = compX;
  scene.frame.y = compY;
  app.stage.addChild(scene.frame);

  // Right-column X anchor (center of column)
  const rightColCX = compX + frameW + gapX + rightColW / 2;

  // ─── LOGO ──────────────────────────────────────────────────────────────────
  scene.logoText = new PIXI.Sprite(logoTexture);
  scene.logoText.anchor.set(0.5, 0);
  scene.logoText.scale.set(logoScale);
  scene.logoText.x = rightColCX;
  scene.logoText.y = compY;
  app.stage.addChild(scene.logoText);

  // ─── MULTIPLIER BAR ────────────────────────────────────────────────────────
  // Empty bar sits first; the "full" overlay on top is revealed from the bottom
  // up via a mask. Above it floats the current multiplier number.
  scene.multiplier = new PIXI.Sprite(multEmptyTexture);
  scene.multiplier.anchor.set(0.5, 0);
  scene.multiplier.scale.set(gameScale);
  scene.multiplier.x = rightColCX;
  scene.multiplier.y = compY + logoH + 16 * gameScale;
  app.stage.addChild(scene.multiplier);

  const multBarH = multEmptyTexture.height * gameScale;
  const multBarW = multEmptyTexture.width * gameScale;
  const multBarX = scene.multiplier.x - multBarW / 2;
  const multBarY = scene.multiplier.y;

  scene.multiplierFill = new PIXI.Sprite(multFullTexture);
  scene.multiplierFill.anchor.set(0.5, 0);
  scene.multiplierFill.scale.set(gameScale);
  scene.multiplierFill.x = scene.multiplier.x;
  scene.multiplierFill.y = scene.multiplier.y;
  app.stage.addChild(scene.multiplierFill);

  // Mask that reveals the bottom portion of the fill sprite.
  scene.multiplierMask = new PIXI.Graphics();
  scene.multiplierMask.beginFill(0xFFFFFF);
  scene.multiplierMask.drawRect(multBarX, multBarY + multBarH, multBarW, 0); // height 0 initially
  scene.multiplierMask.endFill();
  app.stage.addChild(scene.multiplierMask);
  scene.multiplierFill.mask = scene.multiplierMask;

  // Multiplier number text on top of the bar
  scene.multiplierText = new PIXI.Text('1\u00D7', {
    fontFamily: FONT,
    fontSize: Math.max(14, 22 * gameScale),
    fill: 0x3D1C02,
  });
  scene.multiplierText.anchor.set(0.5);
  scene.multiplierText.x = scene.multiplier.x;
  scene.multiplierText.y = multBarY + multBarH / 2;
  app.stage.addChild(scene.multiplierText);

  // ─── CELLS (invisible hit areas for future interactivity) ──────────────────
  // The frame image has the cells baked in visually. We still compute their
  // logical positions for future game logic.
  // Frame-local cell layout (proportions of frame image):
  //   The grid inside the frame occupies roughly the top 90% of the image,
  //   centered horizontally with small padding. Compute an approximate grid
  //   rect inside the frame sprite so future code can place symbols on cells.
  // Inner-grid margins measured against the baked-in cells inside frame.png
  // (968×810). Tuned so flowers land centered on their visible cell squares.
  const FRAME_INNER_PAD_X      = 0.030;
  const FRAME_INNER_PAD_TOP    = 0.037;
  const FRAME_INNER_PAD_BOTTOM = 0.045;
  const innerX = compX + frameW * FRAME_INNER_PAD_X;
  const innerY = compY + frameH * FRAME_INNER_PAD_TOP;
  const innerW = frameW * (1 - FRAME_INNER_PAD_X * 2);
  const innerH = frameH * (1 - FRAME_INNER_PAD_TOP - FRAME_INNER_PAD_BOTTOM);
  const cellGap = frameW * 0.008;   // ~0.8% of frame width between cells
  const cellSize = Math.min(
    (innerW - (COLS - 1) * cellGap) / COLS,
    (innerH - (ROWS - 1) * cellGap) / ROWS
  );
  const gridW = COLS * cellSize + (COLS - 1) * cellGap;
  const gridH = ROWS * cellSize + (ROWS - 1) * cellGap;
  const gridX = innerX + (innerW - gridW) / 2;
  // Hard-coded upward nudge: the frame image has a 3D depth section at the
  // bottom that's part of the border, not a cell. Lifting the symbol layer by
  // ~100 design-pixels sits flowers on the top face of each cell.
  const SYMBOL_Y_NUDGE = 20 * gameScale;
  const gridY = innerY + (innerH - gridH) / 2 - SYMBOL_Y_NUDGE;

  for (let row = 0; row < ROWS; row++) {
    scene.cells[row] = [];
    for (let col = 0; col < COLS; col++) {
      scene.cells[row][col] = {
        x: gridX + col * (cellSize + cellGap),
        y: gridY + row * (cellSize + cellGap),
        w: cellSize,
        h: cellSize,
      };
    }
  }

  // ─── FLOWER SYMBOLS (live grid) ────────────────────────────────────────────
  // Generate once on first build; re-use the same grid on resize so we don't
  // "spin" every time the window changes.
  if (!currentGrid) currentGrid = generateGrid();

  scene.flowerLayer = new PIXI.Container();
  scene.flowers = [];
  for (let row = 0; row < ROWS; row++) {
    scene.flowers[row] = [];
    for (let col = 0; col < COLS; col++) {
      const rect = scene.cells[row][col];
      const data = currentGrid[row][col];
      const flower = new FlowerSymbol(data.color, data.petals, cellSize);
      flower.x = rect.x + rect.w / 2;
      flower.y = rect.y + rect.h / 2;
      scene.flowerLayer.addChild(flower);
      scene.flowers[row][col] = flower;
    }
  }
  // Flowers sit on top of the frame image.
  app.stage.addChild(scene.flowerLayer);

  // Grid mask — anything drawn to flowerLayer outside the cell grid area is
  // hidden. Symbols spawning above the grid or falling out the bottom are
  // clipped so the player only sees them inside the playing field.
  const gridLeft   = scene.cells[0][0].x;
  const gridTop    = scene.cells[0][0].y;
  const gridRight  = scene.cells[0][COLS - 1].x + scene.cells[0][COLS - 1].w;
  const gridBottom = scene.cells[ROWS - 1][0].y + scene.cells[ROWS - 1][0].h;
  scene.gridMask = new PIXI.Graphics();
  scene.gridMask.beginFill(0xFFFFFF);
  scene.gridMask.drawRect(
    gridLeft, gridTop,
    gridRight - gridLeft, gridBottom - gridTop
  );
  scene.gridMask.endFill();
  app.stage.addChild(scene.gridMask);
  scene.flowerLayer.mask = scene.gridMask;

  // Cache grid bounds so animators can use them (spawn above, fall below).
  scene.gridBounds = {
    left: gridLeft, top: gridTop,
    right: gridRight, bottom: gridBottom,
    w: gridRight - gridLeft, h: gridBottom - gridTop,
  };

  // FX layer is ABOVE flowers and NOT masked — in-flight petals, sparkles,
  // and payout text must be visible outside the grid (e.g. sparkles flying
  // up to the multiplier bar).
  scene.fxLayer = new PIXI.Container();
  app.stage.addChild(scene.fxLayer);

  // ─── BALANCE / BET / WIN PILLS ─────────────────────────────────────────────
  //
  //   [ Balance ]     [ Bet ]     [ Win ]
  //             [  SPIN BUTTON  ]
  //
  // Pills are drawn inline with PIXI.Graphics + labels/values above/below.
  // The Bet pill is interactive — click cycles through betLevels.
  const _pillW = 210 * gameScale;
  const _pillH = 58 * gameScale;
  const _pillGap = 14 * gameScale;
  const _adjR   = _pillH * 0.38;                  // adjust button radius
  const pillsCenterY = compY + frameH + 30 * gameScale;
  // Row contents (left to right):
  //   [Info btn] [Balance pill] [WIN pill (wider, centred)] [– Bet +]
  // The – and + buttons are centred on the Bet pill's left/right edges so
  // exactly half of each button sits inside the pill.
  const _infoSize = _pillH * 1.05;              // info button visual size
  const _winPillW = _pillW * 1.55;              // WIN pill is wider
  const pillsTotalW =
    _infoSize + _pillGap +
    _pillW + _pillGap +
    _winPillW + _pillGap +
    _pillW + _adjR * 2;
  const _rowStartX  = (L.sw - pillsTotalW) / 2;

  const infoCX    = _rowStartX + _infoSize / 2;
  const balanceCX = infoCX     + _infoSize / 2 + _pillGap + _pillW / 2;
  const winCX     = balanceCX  + _pillW / 2    + _pillGap + _winPillW / 2;
  const betCX     = winCX      + _winPillW / 2 + _pillGap + _adjR + _pillW / 2;
  const minusCX   = betCX - _pillW / 2;
  const plusCX    = betCX + _pillW / 2;
  const pillsStartX = balanceCX; // kept for any legacy reference

  function makePill({ x, y, label, value, interactive, onClick, accent,
                      width, valueFontSize }) {
    const cont = new PIXI.Container();
    cont.x = x; cont.y = y;
    const pw = width || _pillW;

    const bg = new PIXI.Graphics();
    const drawBg = (hover = false) => {
      bg.clear();
      bg.lineStyle(2 * gameScale, accent || 0xC08050, 0.95);
      bg.beginFill(hover ? 0x3A2414 : 0x2A1808, 0.75);
      bg.drawRoundedRect(-pw / 2, -_pillH / 2, pw, _pillH, _pillH * 0.32);
      bg.endFill();
    };
    drawBg();
    cont.addChild(bg);

    const lbl = new PIXI.Text(label, {
      fontFamily: FONT,
      fontSize: Math.max(10, 13 * gameScale),
      fill: accent || 0xD4A017,
      letterSpacing: 1.2,
    });
    lbl.anchor.set(0.5);
    lbl.y = -_pillH * 0.24;
    cont.addChild(lbl);

    const val = new PIXI.Text(value, {
      fontFamily: FONT,
      fontSize: valueFontSize || Math.max(16, 26 * gameScale),
      fill: 0xFFECB3,
    });
    val.anchor.set(0.5);
    val.y = _pillH * 0.13;
    cont.addChild(val);

    if (interactive) {
      cont.eventMode = 'static';
      cont.cursor = 'pointer';
      cont.hitArea = new PIXI.RoundedRectangle(
        -pw / 2, -_pillH / 2, pw, _pillH, _pillH * 0.32
      );
      cont.on('pointerover', () => {
        drawBg(true);
        gsap.to(cont.scale, { x: 1.03, y: 1.03, duration: 0.12, ease: 'sine.out' });
      });
      cont.on('pointerout', () => {
        drawBg(false);
        gsap.to(cont.scale, { x: 1, y: 1, duration: 0.12 });
      });
      cont.on('pointertap', onClick || (() => {}));
    }

    cont.valText = val;
    cont.labelText = lbl;
    cont.redrawBg = drawBg;
    return cont;
  }

  scene.balancePill = makePill({
    x: balanceCX,
    y: pillsCenterY,
    label: 'BALANCE',
    value: fmtCurrency(player.balance),
    accent: 0xFFD700,
  });
  app.stage.addChild(scene.balancePill);

  // Bet pill is non-interactive; the adjust buttons next to it handle input.
  scene.betPill = makePill({
    x: betCX,
    y: pillsCenterY,
    label: 'BET',
    value: fmtCurrency(player.bet),
    accent: 0xFFAB40,
  });
  app.stage.addChild(scene.betPill);

  // Adjust buttons: circular minus on the left, plus on the right.
  function makeAdjustButton(symbol, onTap) {
    const r = _pillH * 0.38;
    const cont = new PIXI.Container();
    const face = new PIXI.Graphics();
    const drawFace = (hover) => {
      face.clear();
      face.lineStyle(2 * gameScale, 0xC08050, 1);
      face.beginFill(hover ? 0x5C3318 : 0x3D1C02, 0.95);
      face.drawCircle(0, 0, r);
      face.endFill();
    };
    drawFace(false);
    cont.addChild(face);

    const txt = new PIXI.Text(symbol, {
      fontFamily: FONT,
      fontSize: r * 1.3,
      fill: 0xFFECB3,
    });
    txt.anchor.set(0.5);
    txt.y = -r * 0.08;
    cont.addChild(txt);

    cont.eventMode = 'static';
    cont.cursor = 'pointer';
    cont.hitArea = new PIXI.Circle(0, 0, r);
    cont.on('pointerover', () => {
      drawFace(true);
      gsap.to(cont.scale, { x: 1.08, y: 1.08, duration: 0.1, ease: 'sine.out' });
    });
    cont.on('pointerout', () => {
      drawFace(false);
      gsap.to(cont.scale, { x: 1, y: 1, duration: 0.1 });
    });
    cont.on('pointerdown', () => gsap.to(cont.scale, { x: 0.92, y: 0.92, duration: 0.06 }));
    cont.on('pointerup', () => gsap.to(cont.scale, { x: 1.08, y: 1.08, duration: 0.1 }));
    cont.on('pointerupoutside', () => gsap.to(cont.scale, { x: 1, y: 1, duration: 0.1 }));
    cont.on('pointertap', () => {
      if (scene.spinButton.busy) return;
      onTap();
      gsap.fromTo(scene.betPill.valText.scale,
        { x: 1.2, y: 1.2 }, { x: 1, y: 1, duration: 0.3, ease: 'back.out(2)' });
    });
    return cont;
  }

  scene.betMinusBtn = makeAdjustButton('\u2212', () => cycleBet(-1));
  scene.betMinusBtn.x = minusCX;
  scene.betMinusBtn.y = pillsCenterY;
  app.stage.addChild(scene.betMinusBtn);

  scene.betPlusBtn = makeAdjustButton('+', () => cycleBet(+1));
  scene.betPlusBtn.x = plusCX;
  scene.betPlusBtn.y = pillsCenterY;
  app.stage.addChild(scene.betPlusBtn);

  scene.winPill = makePill({
    x: winCX,
    y: pillsCenterY,
    label: 'WIN',
    value: fmtCurrency(0),
    accent: 0x7FE080,
    width: _winPillW,
    valueFontSize: Math.max(22, 34 * gameScale), // bigger, more prominent
  });
  app.stage.addChild(scene.winPill);

  // Small RTP line — low-contrast, near the bottom of the viewport
  scene.rtpText = new PIXI.Text(`RTP 0.00%  |  Spins 0`, {
    fontFamily: FONT,
    fontSize: Math.max(10, 13 * gameScale),
    fill: 0xFFE0A0,
  });
  scene.rtpText.anchor.set(0.5);
  scene.rtpText.alpha = 0.55;
  scene.rtpText.x = L.sw / 2;
  scene.rtpText.y = L.sh - 20 * gameScale;
  app.stage.addChild(scene.rtpText);

  // ─── SPIN BUTTON ───────────────────────────────────────────────────────────
  // Single asset (spin_button.png, 540×538). No text overlay, just the sprite.
  const btnTargetSize = 130 * gameScale;
  const btnX = L.sw / 2;
  const btnY = pillsCenterY + _pillH / 2 + btnTargetSize / 2 + 12 * gameScale;

  const btn = new PIXI.Sprite(spinButtonTexture);
  btn.anchor.set(0.5);
  btn.scale.set(btnTargetSize / spinButtonTexture.height);
  btn.x = btnX;
  btn.y = btnY;

  btn.eventMode = 'static';
  btn.cursor = 'pointer';

  const baseScale = btn.scale.x;
  const hoverScale = baseScale * 1.06;
  const pressScale = baseScale * 0.94;

  btn.on('pointerover', () => {
    if (btn.busy) return;
    gsap.to(btn.scale, { x: hoverScale, y: hoverScale, duration: 0.12, ease: 'sine.out' });
  });
  btn.on('pointerout',  () => {
    if (btn.busy) return;
    gsap.to(btn.scale, { x: baseScale, y: baseScale, duration: 0.12, ease: 'sine.out' });
  });
  btn.on('pointerdown', () => {
    if (btn.busy) return;
    gsap.to(btn.scale, { x: pressScale, y: pressScale, duration: 0.08, ease: 'sine.out' });
  });
  btn.on('pointerup', () => {
    gsap.to(btn.scale, { x: baseScale, y: baseScale, duration: 0.12, ease: 'back.out(2)' });
  });
  btn.on('pointerupoutside', () => {
    gsap.to(btn.scale, { x: baseScale, y: baseScale, duration: 0.12 });
  });
  btn.on('pointertap', () => onSpinClick());

  btn._setBusy = (b) => {
    btn.busy = b;
    btn.alpha = b ? 0.55 : 1;
    btn.cursor = b ? 'default' : 'pointer';
    if (b) {
      // Slow continuous rotation while spinning to suggest activity
      btn._spinTween = gsap.to(btn, { rotation: btn.rotation + Math.PI * 2, duration: 1.2, ease: 'none', repeat: -1 });
    } else {
      if (btn._spinTween) { btn._spinTween.kill(); btn._spinTween = null; }
      gsap.to(btn, { rotation: 0, duration: 0.3, ease: 'power2.out' });
    }
  };

  app.stage.addChild(btn);
  scene.spinButton = btn;

  // ─── INFO BUTTON ───────────────────────────────────────────────────────────
  // Sits to the LEFT of the Balance pill in the main UI row. Opens the
  // paytable modal when tapped.
  const info = new PIXI.Sprite(infoButtonTexture);
  info.anchor.set(0.5);
  info.scale.set(_infoSize / infoButtonTexture.height);
  info.x = infoCX;
  info.y = pillsCenterY;
  info.eventMode = 'static';
  info.cursor = 'pointer';
  const infoBaseScale = info.scale.x;
  info.on('pointerover', () => gsap.to(info.scale, { x: infoBaseScale * 1.08, y: infoBaseScale * 1.08, duration: 0.12 }));
  info.on('pointerout',  () => gsap.to(info.scale, { x: infoBaseScale, y: infoBaseScale, duration: 0.12 }));
  info.on('pointerdown', () => gsap.to(info.scale, { x: infoBaseScale * 0.92, y: infoBaseScale * 0.92, duration: 0.08 }));
  info.on('pointerup',   () => gsap.to(info.scale, { x: infoBaseScale * 1.08, y: infoBaseScale * 1.08, duration: 0.1 }));
  info.on('pointerupoutside', () => gsap.to(info.scale, { x: infoBaseScale, y: infoBaseScale, duration: 0.1 }));
  info.on('pointertap',  () => openPaytableModal(L));
  app.stage.addChild(info);
  scene.infoButton = info;

  // Initial UI sync
  updateMultiplierBar(1);
  updateWinText(0);
  updateBalanceText();
  updateBetText();
  updateRtpText();
  updateSpinButtonState();
}

// ─── UI HELPERS ──────────────────────────────────────────────────────────────

function fmtCurrency(n) {
  // Small integer amounts shown plainly, larger amounts with thousands sep.
  n = Math.round(n);
  if (n < 1000) return `${n}`;
  return n.toLocaleString('en-US');
}

// Smooth numeric count-up on a PIXI.Text, using a tween object.
// Kills any prior tween on the same textObj so rapid successive updates
// don't cause the displayed value to flicker.
function tweenCount(textObj, fromVal, toVal, duration = 0.6, formatter = fmtCurrency) {
  if (!textObj) return;
  if (textObj._countTween) textObj._countTween.kill();
  const o = { v: fromVal };
  textObj._countTween = gsap.to(o, {
    v: toVal,
    duration,
    ease: 'power2.out',
    onUpdate: () => { textObj.text = formatter(o.v); },
    onComplete: () => { textObj.text = formatter(toVal); textObj._countTween = null; },
  });
}

function updateMultiplierBar(mult) {
  uiState.multiplier = mult;
  if (scene.multiplierText) scene.multiplierText.text = `${mult}\u00D7`;
  if (!scene.multiplierFill || !scene.multiplierMask) return;
  const empties = Math.max(0, (mult - 1) / 2);
  const frac = Math.min(1, empties / uiState.multBarMaxEmpties);
  const barX = scene.multiplier.x - scene.multiplier.width / 2;
  const barY = scene.multiplier.y;
  const barW = scene.multiplier.width;
  const barH = scene.multiplier.height;
  const fillH = barH * frac;
  const m = scene.multiplierMask;
  m.clear();
  m.beginFill(0xFFFFFF);
  m.drawRect(barX, barY + barH - fillH, barW, fillH);
  m.endFill();
}

function updateBalanceText(animateFrom) {
  if (!scene.balancePill) return;
  const t = scene.balancePill.valText;
  if (animateFrom !== undefined) {
    tweenCount(t, animateFrom, player.balance, 0.7);
  } else {
    t.text = fmtCurrency(player.balance);
  }
}

function updateBetText() {
  if (!scene.betPill) return;
  scene.betPill.valText.text = fmtCurrency(player.bet);
}

function updateWinText(n, animate = false) {
  if (!scene.winPill) return;
  const t = scene.winPill.valText;
  if (animate) {
    tweenCount(t, player.displayedWin, n, 0.5);
  } else {
    t.text = fmtCurrency(n);
  }
  player.displayedWin = n;
}

function updateRtpText() {
  if (!scene.rtpText) return;
  const s = BloomSort.stats;
  const pct = (s.rtp * 100).toFixed(2);
  scene.rtpText.text = `RTP ${pct}%   |   Spins ${s.spins}   |   Avg win ${s.avgWin.toFixed(1)}`;
}

function updateSpinButtonState() {
  if (!scene.spinButton) return;
  const canPlay = canAffordSpin() && !scene.spinButton.busy;
  scene.spinButton.alpha = canPlay ? 1 : 0.5;
  scene.spinButton.cursor = canPlay ? 'pointer' : 'not-allowed';
  // Keep eventMode 'static' so clicks still land — the handler bounces back
  // with flashInsufficientBalance() or returns silently if busy. This gives
  // the player clear feedback instead of silently-dead buttons.
  scene.spinButton.eventMode = 'static';
}

// Flash the balance pill red briefly when the player tries to spin without
// enough balance. Purely cosmetic.
function flashInsufficientBalance() {
  if (!scene.balancePill) return;
  const bg = scene.balancePill.bgGraphic;
  const cont = scene.balancePill;
  const tl = gsap.timeline();
  tl.to(cont.scale, { x: 1.05, y: 1.05, duration: 0.08, yoyo: true, repeat: 3, ease: 'sine.inOut' });
}

// Big-win celebration: scale pulse on the WIN pill.
function pulseWinPill() {
  if (!scene.winPill) return;
  const t = scene.winPill.valText;
  gsap.fromTo(t.scale,
    { x: 1.4, y: 1.4 },
    { x: 1, y: 1, duration: 0.6, ease: 'elastic.out(1, 0.4)' }
  );
}

// ─── PAYTABLE MODAL ──────────────────────────────────────────────────────────
// Slot-game convention: info button opens a dimmed-backdrop modal with the
// 8 flowers ranked by base pay, each showing the coin value at the current
// bet. Top 2 rarity tiers get a gold accent. Click backdrop or × to close.

function openPaytableModal(L) {
  if (scene.paytableModal) return;

  const modal = new PIXI.Container();

  // Dimmed backdrop — click to close
  const backdrop = new PIXI.Graphics();
  backdrop.beginFill(0x000000, 0.72);
  backdrop.drawRect(0, 0, L.sw, L.sh);
  backdrop.endFill();
  backdrop.eventMode = 'static';
  backdrop.on('pointertap', (e) => { if (e.target === backdrop) closePaytableModal(); });
  modal.addChild(backdrop);

  // Panel sizing: responsive, capped for very large screens
  const scale = Math.min(1, Math.min(L.sw / 900, L.sh / 900));
  const cardW   = 260 * scale;
  const cardH   = 120 * scale;
  const cardGap = 12  * scale;
  const panelPadX = 32 * scale;
  const panelPadTop = 70 * scale;
  const panelPadBottom = 40 * scale;
  const gridW = cardW * 2 + cardGap;
  const panelW = gridW + panelPadX * 2;
  const gridH = cardH * 4 + cardGap * 3;
  const panelH = gridH + panelPadTop + panelPadBottom;
  const panelX = (L.sw - panelW) / 2;
  const panelY = (L.sh - panelH) / 2;

  // Panel background
  const panel = new PIXI.Graphics();
  panel.lineStyle(3 * scale, 0xD4956A, 1);
  panel.beginFill(0xFFF4D6, 0.98);
  panel.drawRoundedRect(panelX, panelY, panelW, panelH, 26 * scale);
  panel.endFill();
  // Subtle inner lip
  panel.lineStyle(1 * scale, 0xE8C898, 0.7);
  panel.drawRoundedRect(panelX + 6 * scale, panelY + 6 * scale, panelW - 12 * scale, panelH - 12 * scale, 22 * scale);
  // Absorb pointer events so clicks inside the panel don't reach the backdrop
  // (which would close the modal).
  panel.eventMode = 'static';
  panel.hitArea = new PIXI.Rectangle(panelX, panelY, panelW, panelH);
  modal.addChild(panel);

  // Title
  const title = new PIXI.Text('Paytable', {
    fontFamily: FONT,
    fontSize: 30 * scale,
    fill: 0x3D1C02,
  });
  title.anchor.set(0.5);
  title.x = panelX + panelW / 2;
  title.y = panelY + 28 * scale;
  modal.addChild(title);

  // Subtitle: mention current bet context
  const sub = new PIXI.Text(`Coins paid per Full Bloom (bet ${player.bet})`, {
    fontFamily: FONT,
    fontSize: 12 * scale,
    fill: 0x9C6A1A,
    letterSpacing: 1,
  });
  sub.anchor.set(0.5);
  sub.x = panelX + panelW / 2;
  sub.y = panelY + 50 * scale;
  modal.addChild(sub);

  // Close button (×) top-right
  const closeBtn = new PIXI.Container();
  const closeR = 22 * scale;
  const closeBg = new PIXI.Graphics();
  const drawClose = (hover) => {
    closeBg.clear();
    closeBg.lineStyle(2 * scale, 0xC08050, 1);
    closeBg.beginFill(hover ? 0x5C3318 : 0x3D1C02, 0.95);
    closeBg.drawCircle(0, 0, closeR);
    closeBg.endFill();
  };
  drawClose(false);
  closeBtn.addChild(closeBg);
  const closeX = new PIXI.Text('\u00D7', {
    fontFamily: FONT, fontSize: closeR * 1.5, fill: 0xFFFFFF,
  });
  closeX.anchor.set(0.5);
  closeBtn.addChild(closeX);
  closeBtn.x = panelX + panelW - 28 * scale;
  closeBtn.y = panelY + 30 * scale;
  closeBtn.eventMode = 'static';
  closeBtn.cursor = 'pointer';
  closeBtn.hitArea = new PIXI.Circle(0, 0, closeR);
  closeBtn.on('pointerover', () => drawClose(true));
  closeBtn.on('pointerout', () => drawClose(false));
  closeBtn.on('pointertap', () => closePaytableModal());
  modal.addChild(closeBtn);

  // Flower cards — sorted by basePay descending (rarest first)
  const sortedColors = [...GAME.COLORS].sort((a, b) => b.basePay - a.basePay);
  const gridX = panelX + panelPadX;
  const gridY = panelY + panelPadTop;
  const flowerPreviewCell = Math.min(cardH - 20 * scale, 96 * scale);

  for (let i = 0; i < sortedColors.length; i++) {
    const color = sortedColors[i];
    const row = Math.floor(i / 2);
    const col = i % 2;
    const cx = gridX + col * (cardW + cardGap);
    const cy = gridY + row * (cardH + cardGap);
    const isTop = i < 2;

    const card = new PIXI.Graphics();
    card.lineStyle(2.5 * scale, isTop ? 0xFFD700 : 0xC08050, 1);
    card.beginFill(isTop ? 0xFFF9D6 : 0xFFFBF0, 1);
    card.drawRoundedRect(cx, cy, cardW, cardH, 14 * scale);
    card.endFill();
    modal.addChild(card);

    // Flower preview — fully bloomed (8 petals) so the pay is visually obvious
    const preview = new FlowerSymbol(color.name, 8, flowerPreviewCell);
    preview.x = cx + cardH / 2;
    preview.y = cy + cardH / 2;
    modal.addChild(preview);

    // Color name
    const name = new PIXI.Text(color.name, {
      fontFamily: FONT,
      fontSize: 22 * scale,
      fill: 0x3D1C02,
    });
    name.x = cx + cardH + 4 * scale;
    name.y = cy + 18 * scale;
    modal.addChild(name);

    // Coin value — basePay × bet, in game coins
    const coinVal = color.basePay * player.bet;
    const pay = new PIXI.Text(`+${fmtCurrency(coinVal)}`, {
      fontFamily: FONT,
      fontSize: 28 * scale,
      fill: isTop ? 0xD4A017 : 0xE65C00,
      stroke: 0x3D1C02,
      strokeThickness: 3 * scale,
    });
    pay.x = cx + cardH + 4 * scale;
    pay.y = cy + cardH * 0.48;
    modal.addChild(pay);

    // Small caption under coin value
    const cap = new PIXI.Text(`base pay ${color.basePay} × bet`, {
      fontFamily: FONT,
      fontSize: 11 * scale,
      fill: 0x9C6A1A,
    });
    cap.x = cx + cardH + 4 * scale;
    cap.y = cy + cardH * 0.82;
    modal.addChild(cap);
  }

  modal.alpha = 0;
  app.stage.addChild(modal);
  scene.paytableModal = modal;

  gsap.to(modal, { alpha: 1, duration: 0.25, ease: 'power2.out' });
}

function closePaytableModal() {
  const m = scene.paytableModal;
  if (!m) return;
  scene.paytableModal = null;
  gsap.to(m, {
    alpha: 0,
    duration: 0.18,
    ease: 'power2.in',
    onComplete: () => m.destroy({ children: true }),
  });
}

// ─── SPIN FLOW ───────────────────────────────────────────────────────────────

async function onSpinClick() {
  if (!scene.spinButton || scene.spinButton.busy) return;
  if (!canAffordSpin()) {
    flashInsufficientBalance();
    return;
  }

  const bet = player.bet;

  // 1. Deduct the bet up front (count-up animation)
  const prevBal = player.balance;
  player.balance -= bet;
  updateBalanceText(prevBal);
  updateSpinButtonState();

  // 2. Reset the spin UI state
  scene.spinButton._setBusy(true);
  updateMultiplierBar(1);
  updateWinText(0);

  // 3. Run the deterministic simulation — animator replays it.
  const result = BloomSort.runSpin(bet);

  if (!animator) animator = new SpinAnimator({ scene, app });

  animator.onProgress = (ev) => {
    if (ev.type === 'dissolve') {
      updateMultiplierBar(ev.multiplier);
      // Live running win = payout × multiplier × bet. Since multiplier is
      // currently disabled it stays at 1, so running win = payoutTotal × bet.
      const runningWin = ev.payoutTotal * ev.multiplier * bet;
      updateWinText(runningWin, true);
    }
  };

  animator.onEnd = (finalResult) => {
    // Commit the final win (payout × multiplier)
    updateWinText(finalResult.finalWin, true);

    // 4. Credit winnings to balance (count-up from pre-credit to post-credit)
    if (finalResult.finalWin > 0) {
      const preCreditBal = player.balance;
      player.balance += finalResult.finalWin;
      updateBalanceText(preCreditBal);
      // Extra celebration for wins > bet (nontrivial hit)
      if (finalResult.finalWin >= bet) pulseWinPill();
    }

    updateRtpText();
    currentGrid = finalResult.finalGrid;
    scene.spinButton._setBusy(false);
    updateSpinButtonState();
  };

  await animator.play(result);
}

// ═══════════════════════════════════════════════════════════════════════════════
// INITIAL BUILD & RESIZE
// ═══════════════════════════════════════════════════════════════════════════════
function rebuild() {
  const L = calculateLayout(app.screen.width, app.screen.height);
  buildScene(L);
}

rebuild();

let resizeTimer = null;
window.addEventListener('resize', () => {
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(rebuild, 50);
});

// ─── KEYBOARD: Space = spin ─────────────────────────────────────────────────
// Standard slot-game convention — hitting space triggers the spin. We also
// use Escape to close the paytable modal. Space swallowed everywhere so it
// doesn't scroll the page or activate a focused button by accident.
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (scene.paytableModal) {
      closePaytableModal();
      return;
    }
    onSpinClick();
  } else if (e.code === 'Escape' && scene.paytableModal) {
    closePaytableModal();
  }
});

})();
</script>
