      drawBuyBg(false);
      gsap.to(buyCont.scale, { x: 1, y: 1, duration: 0.12 });
    });
    buyCont.on('pointertap', () => {
      if (!canBuyFeature() || (scene.spinButton && scene.spinButton.busy)) return;
      openBuyFeatureModal();
    });

    refreshBuy();
    scene.buyBtn = buyCont;
    scene.buyBtn._refresh = refreshBuy;
    app.stage.addChild(buyCont);

    // Banner shown while the feature is active: "FREE SPINS · N LEFT".
    const bannerCont = new PIXI.Container();
    bannerCont.x = bfX; bannerCont.y = bfY;
    bannerCont.visible = false;
    const bBg = new PIXI.Graphics();
    bBg.lineStyle(2.5 * gameScale, 0xFFD54F, 1);
    bBg.beginFill(0x7A3E16, 0.95);
    bBg.drawRoundedRect(-bfW / 2, -bfH / 2, bfW, bfH, bfH * 0.3);
    bBg.endFill();
    bannerCont.addChild(bBg);
    const bTitle = new PIXI.Text('FREE SPINS', {
      fontFamily: FONT,
      fontSize: Math.max(13, 15 * gameScale),
      fill: 0xFFECB3,
      letterSpacing: 0.6,
    });
    bTitle.anchor.set(0.5);
    bTitle.y = -bfH * 0.22;
    bannerCont.addChild(bTitle);
    const bCount = new PIXI.Text('', {
      fontFamily: FONT,
      fontSize: Math.max(18, 22 * gameScale),
      fill: 0xFFD54F,
    });
    bCount.anchor.set(0.5);
    bCount.y = bfH * 0.17;
    bannerCont.addChild(bCount);

    const refreshBanner = () => {
      bannerCont.visible = player.feature.active;
      bCount.text = `${player.feature.spinsLeft} LEFT`;
    };
    refreshBanner();
    scene.featureBanner = bannerCont;
    scene.featureBanner._refresh = refreshBanner;
    app.stage.addChild(bannerCont);
  } else {
    scene.buyBtn        = null;
    scene.featureBanner = null;
  }

  // ─── STATUS TEXT (replaces the old WIN pill slot in the bottom UI row) ──
  // Reads "Good luck!" before a spin; once a spin completes we swap the text
  // to "WIN <amount>". Updated via updateStatusText(…).
  scene.statusText = new PIXI.Text('Good luck!', {
    fontFamily: FONT,
    fontSize: Math.max(20, 32 * gameScale),
    fill: 0xFFECB3,
    letterSpacing: 0.6,
  });
  scene.statusText.anchor.set(0.5);
  scene.statusText.x = winCX;
  scene.statusText.y = pillsCenterY;
  app.stage.addChild(scene.statusText);

  // Small RTP line — low-contrast, near the bottom of the viewport
  scene.rtpText = new PIXI.Text(`RTP 0.00%  |  Spins 0`, {
    fontFamily: FONT,
    fontSize: Math.max(10, 13 * gameScale),
    fill: 0xFFE0A0,
  });
  scene.rtpText.anchor.set(0.5);
  scene.rtpText.alpha = 0.55;
  scene.rtpText.x = L.sw / 2;
  scene.rtpText.y = L.sh - 20 * gameScale;
  app.stage.addChild(scene.rtpText);

  // ─── SPIN BUTTON ───────────────────────────────────────────────────────────
  // In the same horizontal row as the UI pills, on the LEFT end. Its bottom
  // aligns with the pill bottom; since the button is taller than the pills it
  // extends upward into the holder gap.
  const btnX = spinCX;
  const btnY = pillsCenterY + _pillH / 2 - btnTargetSize / 2;

  const btn = new PIXI.Sprite(spinButtonTexture);
  btn.anchor.set(0.5);
  btn.scale.set(btnTargetSize / spinButtonTexture.height);
  btn.x = btnX;
  btn.y = btnY;

  btn.eventMode = 'static';
  btn.cursor = 'pointer';

  const baseScale = btn.scale.x;
  const hoverScale = baseScale * 1.06;
  const pressScale = baseScale * 0.94;

  btn.on('pointerover', () => {
    if (btn.busy) return;
    gsap.to(btn.scale, { x: hoverScale, y: hoverScale, duration: 0.12, ease: 'sine.out' });
  });
  btn.on('pointerout',  () => {
    if (btn.busy) return;
    gsap.to(btn.scale, { x: baseScale, y: baseScale, duration: 0.12, ease: 'sine.out' });
  });
  btn.on('pointerdown', () => {
    if (btn.busy) return;
    gsap.to(btn.scale, { x: pressScale, y: pressScale, duration: 0.08, ease: 'sine.out' });
  });
  btn.on('pointerup', () => {
    gsap.to(btn.scale, { x: baseScale, y: baseScale, duration: 0.12, ease: 'back.out(2)' });
  });
  btn.on('pointerupoutside', () => {
    gsap.to(btn.scale, { x: baseScale, y: baseScale, duration: 0.12 });
  });
  btn.on('pointertap', () => onSpinClick());

  btn._setBusy = (b) => {
    btn.busy = b;
    btn.alpha = b ? 0.55 : 1;
    btn.cursor = b ? 'default' : 'pointer';
    if (b) {
      // Slow continuous rotation while spinning to suggest activity
      btn._spinTween = gsap.to(btn, { rotation: btn.rotation + Math.PI * 2, duration: 1.2, ease: 'none', repeat: -1 });
    } else {
      if (btn._spinTween) { btn._spinTween.kill(); btn._spinTween = null; }
      gsap.to(btn, { rotation: 0, duration: 0.3, ease: 'power2.out' });
    }
  };

  app.stage.addChild(btn);
  scene.spinButton = btn;

  // ─── INFO BUTTON ───────────────────────────────────────────────────────────
  // Sits to the LEFT of the Balance pill in the main UI row. Opens the
  // paytable modal when tapped.
  const info = new PIXI.Sprite(infoButtonTexture);
  info.anchor.set(0.5);
  info.scale.set(_infoSize / infoButtonTexture.height);
  info.x = infoCX;
  info.y = pillsCenterY;
  info.eventMode = 'static';
  info.cursor = 'pointer';
  const infoBaseScale = info.scale.x;
  info.on('pointerover', () => gsap.to(info.scale, { x: infoBaseScale * 1.08, y: infoBaseScale * 1.08, duration: 0.12 }));
  info.on('pointerout',  () => gsap.to(info.scale, { x: infoBaseScale, y: infoBaseScale, duration: 0.12 }));
  info.on('pointerdown', () => gsap.to(info.scale, { x: infoBaseScale * 0.92, y: infoBaseScale * 0.92, duration: 0.08 }));
  info.on('pointerup',   () => gsap.to(info.scale, { x: infoBaseScale * 1.08, y: infoBaseScale * 1.08, duration: 0.1 }));
  info.on('pointerupoutside', () => gsap.to(info.scale, { x: infoBaseScale, y: infoBaseScale, duration: 0.1 }));
  info.on('pointertap',  () => openPaytableModal(L));
  app.stage.addChild(info);
  scene.infoButton = info;

  // Initial UI sync
  updateMultiplierBar(1, 0);
  updateWinText(0);
  updateBalanceText();
  updateBetText();
  updateRtpText();
  updateSpinButtonState();
  updateStatusText('Good luck!');
  refreshFeatureUI();

  // Lift the FX layer to the top of the z-stack so in-flight petals, pot
  // flights to the multiplier, and other effects always render above every
  // UI element (pills, spin button, etc.).
  if (scene.fxLayer && scene.fxLayer.parent === app.stage) {
    app.stage.setChildIndex(scene.fxLayer, app.stage.children.length - 1);
  }
}

// ─── UI HELPERS ──────────────────────────────────────────────────────────────

function fmtCurrency(n) {
  // European-style formatting: period as thousands separator, comma as
  // decimal (e.g. 10.000,00). Always two decimal places — no rounding to
  // integer, so small payouts at low bets still show their actual value.
  const v = Number(n) || 0;
  return v.toLocaleString('de-DE', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  });
}

// Smooth numeric count-up on a PIXI.Text, using a tween object.
// Kills any prior tween on the same textObj so rapid successive updates
// don't cause the displayed value to flicker.
function tweenCount(textObj, fromVal, toVal, duration = 0.6, formatter = fmtCurrency) {
  if (!textObj) return;
  if (textObj._countTween) textObj._countTween.kill();
  const o = { v: fromVal };
  textObj._countTween = gsap.to(o, {
    v: toVal,
    duration,
    ease: 'power2.out',
    onUpdate: () => { textObj.text = formatter(o.v); },
    onComplete: () => { textObj.text = formatter(toVal); textObj._countTween = null; },
  });
}

// Force a specific multiplier + empty-count state onto the UI. Used on spin
// reset (mult=1, emptyCount=0) — during a spin, pot-landings drive the UI via
// bumpMultiplierOnPotLanded() instead, so the bar visibly fills in the moment
// the pot hits the pill.
function updateMultiplierBar(mult, emptyCount) {
  uiState.multiplier = mult;
  uiState.emptyCount = emptyCount || 0;
  if (!scene.winPill) return;

  const isBaseline = mult <= 1;

  if (scene.winPill.rightValText) {
    // Baseline (no empties yet) reads as a dash, so "1×" doesn't look like
    // the player already built a multiplier. Real tier values still show
    // as "N×".
    scene.winPill.rightValText.text = isBaseline ? '\u2013' : `${mult}\u00D7`;
  }

  if (scene.winPill.setMultiplierProgress) {
    if (isBaseline) {
      scene.winPill.setMultiplierProgress(0, { animate: false });
    } else {
      const info = multTierProgress(uiState.emptyCount);
      scene.winPill.setMultiplierProgress(info.progress, { animate: false });
    }
  }
}

// Called the moment an empty-dissolve pot lands on the MULTIPLIER half of the
// pill. Bumps the cumulative empty count by one, recomputes the multiplier
// via the tier ladder, and snaps the progress bar to the new level. This is
// the ONLY path that advances the multiplier UI during a live spin — the
// model's dissolve event is used just to drive the WIN count-up.
// Returns true when this pot's landing actually changed the multiplier value
// (i.e. crossed a tier threshold), false when the bar just advanced within
// the same tier. Callers use this to gate the number-bounce animation so the
// × text only pops when the value visibly changed.
function bumpMultiplierOnPotLanded() {
  if (!scene.winPill) return false;
  const prevMult = uiState.multiplier;
  uiState.emptyCount = (uiState.emptyCount || 0) + 1;
  const newMult = GAME.MULTIPLIER_ENABLED ? multForEmpties(uiState.emptyCount) : 1;
  uiState.multiplier = newMult;

  if (scene.winPill.rightValText) {
    // Baseline (no empties yet) reads as a dash; tier values show as "N×".
    scene.winPill.rightValText.text = newMult <= 1 ? '\u2013' : `${newMult}\u00D7`;
  }

  if (scene.winPill.setMultiplierProgress) {
    const info = multTierProgress(uiState.emptyCount);
    // A tier threshold was crossed if the ACTUAL multiplier went up on this
    // pot (and it wasn't the very first pot coming off baseline — the first
    // pot starts the bar at 0, so there's no "jumping backward" to fix).
    const tierAdvanced = newMult > prevMult && prevMult > 1;
    scene.winPill.setMultiplierProgress(info.progress, {
      tierAdvance: tierAdvanced,
    });
  }

  return newMult !== prevMult;
}

function updateBalanceText(animateFrom) {
  if (!scene.balancePill) return;
  const t = scene.balancePill.valText;
  if (animateFrom !== undefined) {
    tweenCount(t, animateFrom, player.balance, 0.7);
  } else {
    t.text = fmtCurrency(player.balance);
  }
}

function updateBetText() {
  if (!scene.betPill) return;
  scene.betPill.valText.text = fmtCurrency(player.bet);
}

// Back-compat no-op. The old Avalanche pill had an in-pill "Good luck!"
// overlay that we toggled on the WIN side; the new permanent pill never
// shows a greeting and the bottom status text drives that messaging now.
// Kept so lingering callers don't error out.
function setGreetingVisible(visible, animate = true) {
  if (!scene.winPill) return;
  const greet   = scene.winPill.greeting;
  const label   = scene.winPill.leftLabel;
  const valText = scene.winPill.leftValText;
  const dur = animate ? 0.2 : 0;
  // If the pill has no greeting (permanent pill), keep label+value visible
  // regardless of the requested mode.
  if (!greet) {
    if (label)   gsap.to(label,   { alpha: 1, duration: dur });
    if (valText) gsap.to(valText, { alpha: 1, duration: dur });
    return;
  }
  gsap.to(greet,   { alpha: visible ? 1 : 0, duration: dur });
  if (label)   gsap.to(label,   { alpha: visible ? 0 : 1, duration: dur });
  if (valText) gsap.to(valText, { alpha: visible ? 0 : 1, duration: dur });
}

function updateWinText(n, animate = false) {
  if (!scene.winPill) return;
  const valText = scene.winPill.leftValText;
  if (!valText) return;

  if (n <= 0) {
    if (valText._countTween) { valText._countTween.kill(); valText._countTween = null; }
    valText.text = fmtCurrency(0);
    player.displayedWin = 0;
    return;
  }

  if (animate) {
    tweenCount(valText, player.displayedWin || 0, n, 0.5);
  } else {
    valText.text = fmtCurrency(n);
  }
  player.displayedWin = n;
}

// ─── Alt-2 multiplier tile badges ──────────────────────────────────────────
// A small pill with "N×" floating at the top-right corner of a cell.
// Persistent until the spin ends (or the scene is rebuilt).
function formatTileMult(v) {
  // Integers show plainly ("8×"); halves show as decimals ("2.5×") for the
  // edge case where a neighbour contribution is odd/2.
  if (Number.isInteger(v)) return `${v}\u00D7`;
  return `${v.toFixed(1)}\u00D7`;
}
const TILE_BADGE_INSET = 10;  // px inset from cell corner (pre-scaling)
function _tileBadgePadX() { return 10 * currentGameScale; }
function _tileBadgeHeight() { return Math.max(22, 26 * currentGameScale); }

// Paint / clear a gold tint overlay on a cell when it holds a multiplier.
// Colour intensity nudges up slightly with multiplier value.
function setCellTint(r, c, value) {
  if (!scene.cellTints) return;
  const rect = scene.cells[r] && scene.cells[r][c];
  if (!rect) return;
  const existing = scene.cellTints[r][c];
  if (value <= 0) {
    if (existing) {
      gsap.killTweensOf(existing);
      existing.destroy();
      scene.cellTints[r][c] = null;
    }
    return;
  }
  // Stronger wash for bigger multipliers; capped so it never dominates.
  const alphaTarget = Math.min(0.48, 0.18 + Math.log10(1 + value) * 0.08);

  if (existing) {
    gsap.to(existing, { alpha: alphaTarget, duration: 0.2, ease: 'sine.out' });
    return;
  }
  const g = new PIXI.Graphics();
  // Circle centred on the cell, sized to the cell's short side. Sits behind
  // the flower and doesn't fight the frame's 3-D cell border.
  const cx = rect.x + rect.w / 2;
  const cy = rect.y + rect.h / 2;
  const radius = Math.min(rect.w, rect.h) * 0.44;
  g.beginFill(0xFFC837, 1);
  g.drawCircle(cx, cy, radius);
  g.endFill();
  g.alpha = 0;
  scene.cellTintLayer.addChild(g);
  scene.cellTints[r][c] = g;
  gsap.to(g, { alpha: alphaTarget, duration: 0.24, ease: 'sine.out' });
}

function clearAllCellTints() {
  if (!scene.cellTints) return;
  for (let r = 0; r < scene.cellTints.length; r++) {
    for (let c = 0; c < scene.cellTints[r].length; c++) {
      const t = scene.cellTints[r][c];
      if (t) {
        gsap.killTweensOf(t);
        t.destroy();
        scene.cellTints[r][c] = null;
      }
    }
  }
}

// Big multiplier text on the cell — rendered BEHIND the pot so the pot art
// stays readable on top. `value` of 0 (or less) clears the text.
function setCellMultText(r, c, value) {
  if (!scene.cellMultTexts) return;
  const rect = scene.cells[r] && scene.cells[r][c];
  if (!rect) return;
  const existing = scene.cellMultTexts[r][c];
  if (value <= 0) {
    if (existing) {
      gsap.killTweensOf(existing);
      gsap.killTweensOf(existing.scale);
      existing.destroy();
      scene.cellMultTexts[r][c] = null;
    }
    return;
  }

  const cellShort = Math.min(rect.w, rect.h);
  const fontSize = Math.max(20, Math.floor(cellShort * 0.52));
  const stroke = Math.max(3, 5 * currentGameScale);
  const label = formatTileMult(value);

  if (existing) {
    existing.text = label;
    // Resize if we went past a digit boundary (e.g. 50× → 100×).
    if (existing.style.fontSize !== fontSize) {
      existing.style.fontSize = fontSize;
    }
    existing.x = rect.x + rect.w / 2;
    existing.y = rect.y + rect.h / 2;
    gsap.fromTo(existing.scale,
      { x: 1.25, y: 1.25 },
      { x: 1, y: 1, duration: 0.32, ease: 'back.out(2)' });
    return;
  }

  const t = new PIXI.Text(label, {
    fontFamily: FONT,
    fontSize,
    fill: 0xFFD54F,
    stroke: 0x3D1C02,
    strokeThickness: stroke,
    letterSpacing: 0.4,
  });
  t.anchor.set(0.5);
  t.x = rect.x + rect.w / 2;
  t.y = rect.y + rect.h / 2;
  t.alpha = 0;
  t.scale.set(0.6);
  scene.cellMultTextLayer.addChild(t);
  scene.cellMultTexts[r][c] = t;
  gsap.to(t, { alpha: 0.85, duration: 0.2, ease: 'power2.out' });
  gsap.to(t.scale, { x: 1, y: 1, duration: 0.34, ease: 'back.out(2)' });
}

function clearAllCellMultTexts() {
  if (!scene.cellMultTexts) return;
  for (let r = 0; r < scene.cellMultTexts.length; r++) {
    for (let c = 0; c < scene.cellMultTexts[r].length; c++) {
      const t = scene.cellMultTexts[r][c];
      if (t) {
        gsap.killTweensOf(t);
        gsap.killTweensOf(t.scale);
        t.destroy();
        scene.cellMultTexts[r][c] = null;
      }
    }
  }
}

function _makeTileBadge(value) {
  const cont = new PIXI.Container();
  const pad = _tileBadgePadX();
  const h   = _tileBadgeHeight();

  const bg = new PIXI.Graphics();
  const text = new PIXI.Text(formatTileMult(value), {
    fontFamily: FONT,
    fontSize: Math.max(13, 15 * currentGameScale),
    fill: 0xFFECB3,
    stroke: 0x3D1C02,
    strokeThickness: 2.5 * currentGameScale,
  });
  text.anchor.set(0.5);
  const drawBg = () => {
    const w = text.width + pad * 2;
    bg.clear();
    bg.lineStyle(1.5 * currentGameScale, 0xFFD54F, 0.9);
    bg.beginFill(0x3D1C02, 0.92);
    bg.drawRoundedRect(-w / 2, -h / 2, w, h, h * 0.5);
    bg.endFill();
  };
  drawBg();
  cont.addChild(bg);
  cont.addChild(text);

  cont._badgeBg   = bg;
  cont._badgeText = text;
  cont._redraw    = drawBg;
  cont._value     = value;
  cont._computeW  = () => text.width + pad * 2;
  cont._height    = h;
  return cont;
}

// Compute the (centre) x/y the badge sits at for top-right-of-cell anchoring.
function _tileBadgeCenterForCell(rect, badgeWidth) {
  const inset = TILE_BADGE_INSET * currentGameScale;
  const h     = _tileBadgeHeight();
  return {
    x: rect.x + rect.w - inset - badgeWidth / 2,
    y: rect.y + inset + h / 2,
  };
}

// Place or update a tile badge at (r,c) showing `value`. If the cell already
// has a badge, animate the value change. If `value` is 0 or negative, clears
// the badge. `opts.skipEntry` skips the pop-in tween (used when an upstream
// reveal animation is handling the entrance).
function setCellTileBadge(r, c, value, opts = {}) {
  if (!scene.tileBadges) return null;
  const rect = scene.cells[r] && scene.cells[r][c];
  if (!rect) return null;
  const existing = scene.tileBadges[r][c];
  if (value <= 0) {
    if (existing) {
      existing.destroy({ children: true });
      scene.tileBadges[r][c] = null;
    }
    setCellTint(r, c, 0);
    setCellMultText(r, c, 0);
    return null;
  }

  // Tint the cell + paint the big multiplier text behind the flower.
  setCellTint(r, c, value);
  setCellMultText(r, c, value);

  if (existing) {
    existing._badgeText.text = formatTileMult(value);
    existing._redraw();
    existing._value = value;
    const w = existing._computeW();
    const p = _tileBadgeCenterForCell(rect, w);
    existing.x = p.x;
    existing.y = p.y;
    // Quick scale pulse to sell the update.
    gsap.fromTo(existing.scale,
      { x: 1.35, y: 1.35 },
      { x: 1, y: 1, duration: 0.35, ease: 'back.out(2)' });
    return existing;
  }

  const badge = _makeTileBadge(value);
  const w = badge._computeW();
  const p = _tileBadgeCenterForCell(rect, w);
  badge.x = p.x;
  badge.y = p.y;
  scene.tileBadgeLayer.addChild(badge);
  scene.tileBadges[r][c] = badge;
  if (opts.skipEntry) {
    badge.alpha = 1;
    badge.scale.set(1);
  } else {
    badge.alpha = 0;
    badge.scale.set(0.4);
    gsap.to(badge, { alpha: 1, duration: 0.25, ease: 'power2.out' });
    gsap.to(badge.scale, { x: 1, y: 1, duration: 0.45, ease: 'back.out(2.2)' });
  }
  return badge;
}

// Wipe every tile badge (spin-end / mode-change). Also clears any cell
// tints and big multiplier texts painted behind the flowers.
function clearAllTileBadges() {
  if (!scene.tileBadges) return;
  for (let r = 0; r < scene.tileBadges.length; r++) {
    for (let c = 0; c < scene.tileBadges[r].length; c++) {
      const b = scene.tileBadges[r][c];
      if (b) {
        b.destroy({ children: true });
        scene.tileBadges[r][c] = null;
      }
    }
  }
  clearAllCellTints();
  clearAllCellMultTexts();
}

// Update the bottom status line. Shows "Good luck!" before a spin and
// "WIN <amount>" once a spin has paid out.
function updateStatusText(text) {
  if (!scene.statusText) return;
  scene.statusText.text = text;
  // Small scale pulse on change so it reads as "updated".
  gsap.fromTo(scene.statusText.scale,
    { x: 0.92, y: 0.92 },
    { x: 1, y: 1, duration: 0.28, ease: 'back.out(2)' });
}

function updateRtpText() {
  if (!scene.rtpText) return;
  const s = BloomSort.stats;
  const pct = (s.rtp * 100).toFixed(2);
  scene.rtpText.text = `RTP ${pct}%   |   Spins ${s.spins}   |   Avg win ${s.avgWin.toFixed(1)}`;
}

function updateSpinButtonState() {
  if (!scene.spinButton) return;
  const canPlay = canAffordSpin() && !scene.spinButton.busy;
  scene.spinButton.alpha = canPlay ? 1 : 0.5;
  scene.spinButton.cursor = canPlay ? 'pointer' : 'not-allowed';
  // Keep eventMode 'static' so clicks still land — the handler bounces back
  // with flashInsufficientBalance() or returns silently if busy. This gives
  // the player clear feedback instead of silently-dead buttons.
  scene.spinButton.eventMode = 'static';
}

// Grey out / re-enable the bet adjust buttons based on feature state.
function refreshBetControlsEnabled() {
  const locked = player.feature.active;
  const btns = [scene.betMinusBtn, scene.betPlusBtn];
  for (const b of btns) {
    if (!b) continue;
    b.alpha = locked ? 0.4 : 1;
    b.eventMode = locked ? 'none' : 'static';
    b.cursor    = locked ? 'default' : 'pointer';
  }
  if (scene.betPill) scene.betPill.alpha = locked ? 0.65 : 1;
}

// Called when the player confirms the BUY FEATURE modal. Deducts cost,
// flips into free-spin mode, auto-starts the first spin.
function startFeature() {
  if (!canBuyFeature()) return;
  const cost = featureCost();
  const prevBal = player.balance;
  player.balance -= cost;
  updateBalanceText(prevBal);
  player.feature.active    = true;
  player.feature.spinsLeft = FEATURE_SPIN_COUNT;
  player.feature.cellMults = makeEmptyCellMults();
  player.feature.lockedBet = player.bet;
  player.feature.totalWin  = 0;
  // Clear any leftover tile badges from prior spins — feature tiles start
  // fresh and accumulate from here.
  clearAllTileBadges();
  refreshFeatureUI();
  updateStatusText('WIN 0,00');
  // Auto-start the first spin — feature spins play back-to-back.
  setTimeout(() => { onSpinClick(); }, 250);
}

// Called when the 15th spin finishes (or if feature is cleared otherwise).
// Shows the "Congratulations" result popup with the total feature winnings.
function endFeature() {
  const totalWon = player.feature.totalWin || 0;
  player.feature.active    = false;
  player.feature.spinsLeft = 0;
  player.feature.cellMults = null;
  player.feature.lockedBet = null;
  player.feature.totalWin  = 0;
  clearAllTileBadges();
  refreshFeatureUI();
  openFeatureResultModal(totalWon);
}

// Refresh every bit of UI that depends on feature state.
function refreshFeatureUI() {
  if (scene.buyBtn && scene.buyBtn._refresh)             scene.buyBtn._refresh();
  if (scene.featureBanner && scene.featureBanner._refresh) scene.featureBanner._refresh();
  refreshBetControlsEnabled();
  // Mechanic toggle disabled mid-feature — redraw to reflect.
  if (scene.chainBtn && scene.chainBtn._redraw) scene.chainBtn._redraw();
  if (scene.tileBtn  && scene.tileBtn._redraw)  scene.tileBtn._redraw();
  updateSpinButtonState();
}

// Flash the balance pill red briefly when the player tries to spin without
// enough balance. Purely cosmetic.
function flashInsufficientBalance() {
  if (!scene.balancePill) return;
  const bg = scene.balancePill.bgGraphic;
  const cont = scene.balancePill;
  const tl = gsap.timeline();
  tl.to(cont.scale, { x: 1.05, y: 1.05, duration: 0.08, yoyo: true, repeat: 3, ease: 'sine.inOut' });
}

// Multiplication reveal: composed as a readable equation across the pill —
// WIN value on the left · × in the centre · MULTIPLIER value on the right.
// The × pops in, pulses, then bursts; the MULTIPLIER side fades away; the
// WIN value then counts up from `baseWin` to `finalWin` right where it
// already sits on the left. Returns a promise that resolves when the
// count-up completes.
function animateMultiplication(baseWin, finalWin) {
  return new Promise(resolve => {
    const winPill = scene.winPill;
    if (!winPill || !winPill.leftValText || !winPill.rightValText) {
      resolve();
      return;
    }
    const winVal    = winPill.leftValText;
    const winLabel  = winPill.leftLabel;
    const multVal   = winPill.rightValText;
    const multLabel = winPill.rightLabel;
    const divider   = winPill.divider;

    // Kill any in-flight count-up on the win value so we control it here.
    if (winVal._countTween) { winVal._countTween.kill(); winVal._countTween = null; }

    // Anticipation beat — let the player read the final WIN and MULTIPLIER
    // side-by-side for a second before the × pops in between them.
    const PRE_MERGE_HOLD_MS = 1000;
    setTimeout(() => runMerge(), PRE_MERGE_HOLD_MS);

    function runMerge() {

    // Yank the multiplier progress bar the moment the merge begins — it
    // shouldn't compete visually with the × reveal + count-up.
    if (winPill.hideMultiplierBar) winPill.hideMultiplierBar(false);

    // × mark at the pill's value-row Y, right between the two values.
    const gs = currentGameScale;
    const xMark = new PIXI.Text('\u00D7', {
      fontFamily: FONT,
      fontSize: Math.max(30, 56 * gs),
      fill: 0xFFD700,
      stroke: 0x3D1C02,
      strokeThickness: 4 * gs,
    });
    xMark.anchor.set(0.5);
    xMark.x = 0;
    xMark.y = winVal.y;
    xMark.alpha = 0;
    xMark.scale.set(0.25);
    winPill.addChild(xMark);

    // One timeline for the visual choreography — the promise's resolution is
    // driven by an explicit setTimeout so a quirk in timeline duration
    // computation (e.g. no-op trailing tween getting dropped) never hangs us.
    const tl = gsap.timeline();

    // Subtle "pull in" — nudge WIN and MULT slightly toward the centre so the
    // equation reads tighter without stacking on top of each other. Uses the
    // existing expanded positions as starting anchors so the motion is small
    // and legible (WIN + MULT keep their labels where they are).
    const PULL_IN_FRAC = 0.45;   // slide 45% of the way toward x=0
    const winTargetX  = winVal.x  * (1 - PULL_IN_FRAC);
    const multTargetX = multVal.x * (1 - PULL_IN_FRAC);
    tl.to(winVal,    { x: winTargetX,  duration: 0.28, ease: 'power2.out' }, 0);
    tl.to(winLabel,  { x: winTargetX,  duration: 0.28, ease: 'power2.out' }, 0);
    tl.to(multVal,   { x: multTargetX, duration: 0.28, ease: 'power2.out' }, 0);
    tl.to(multLabel, { x: multTargetX, duration: 0.28, ease: 'power2.out' }, 0);

    // × materialises between them.
    tl.to(xMark,       { alpha: 1,       duration: 0.28, ease: 'power2.out' }, 0);
    tl.to(xMark.scale, { x: 1.3, y: 1.3, duration: 0.36, ease: 'back.out(2.2)' }, 0);
    // Hold at centre so the "A × B" equation reads, then burst the ×.
    tl.to(xMark.scale, { x: 2.6, y: 2.6, duration: 0.28, ease: 'power2.out' }, 0.60);
    tl.to(xMark,       { alpha: 0,       duration: 0.28, ease: 'power2.out' }, 0.60);
    // MULTIPLIER side is consumed — fade value + label + divider.
    tl.to(multVal,     { alpha: 0,       duration: 0.22, ease: 'power2.in'  }, 0.62);
    tl.to(multLabel,   { alpha: 0,       duration: 0.22, ease: 'power2.in'  }, 0.62);
    tl.to(divider,     { alpha: 0,       duration: 0.22, ease: 'power2.in'  }, 0.62);
    // WIN slides to centre as the × clears, so the count-up happens in the
    // middle of the pill rather than off on the left. The pre-merge label
    // ("BLOOM WIN") also shrinks down to just "WIN" at this moment — once
    // the multiplier has been applied, the value is purely a win amount.
    tl.to(winVal,   { x: 0, duration: 0.30, ease: 'power2.out' }, 0.62);
    tl.to(winLabel, { x: 0, duration: 0.30, ease: 'power2.out' }, 0.62);
    tl.call(() => { if (winLabel) winLabel.text = 'WIN'; }, null, 0.62);

    // Count-up begins once the × has burst AND WIN has settled at centre.
    const COUNTUP_START_MS = 950;
    const COUNTUP_MS       = 750;
    const BUFFER_MS        = 150;

    setTimeout(() => {
      if (winPill.leftValText) {
        tweenCount(winVal, baseWin, finalWin, COUNTUP_MS / 1000);
        player.displayedWin = finalWin;
        // Synchronised scale pulse on the WIN value during count-up.
        gsap.killTweensOf(winVal.scale);
        const countSec = COUNTUP_MS / 1000;
        gsap.timeline()
          .to(winVal.scale, {
            x: 1.55, y: 1.55,
            duration: countSec * 0.55,
            ease: 'power2.out',
          })
          .to(winVal.scale, {
            x: 1, y: 1,
            duration: countSec * 0.55,
            ease: 'elastic.out(1, 0.35)',
          });
      }
    }, COUNTUP_START_MS);

    // Resolve unconditionally after count-up + small buffer so onEnd always
    // proceeds (no hang if the timeline auto-finalizes earlier).
    setTimeout(() => {
      if (xMark && !xMark.destroyed) xMark.destroy();
      resolve();
    }, COUNTUP_START_MS + COUNTUP_MS + BUFFER_MS);

    }  // end runMerge
  });
}

// Big-win celebration: scale pulse on the WIN half of the Win/Mult pill.
function pulseWinPill() {
  if (!scene.winPill) return;
  const t = scene.winPill.leftValText;
  if (!t) return;
  gsap.fromTo(t.scale,
    { x: 1.4, y: 1.4 },
    { x: 1, y: 1, duration: 0.6, ease: 'elastic.out(1, 0.4)' }
  );
}

// ─── PAYTABLE MODAL ──────────────────────────────────────────────────────────
// Slot-game convention: info button opens a dimmed-backdrop modal with the
// 8 flowers ranked by base pay, each showing the coin value at the current
// bet. Top 2 rarity tiers get a gold accent. Click backdrop or × to close.

function openPaytableModal(L) {
  if (scene.paytableModal) return;

  const modal = new PIXI.Container();

  // Dimmed backdrop — click to close
  const backdrop = new PIXI.Graphics();
  backdrop.beginFill(0x000000, 0.72);
  backdrop.drawRect(0, 0, L.sw, L.sh);
  backdrop.endFill();
  backdrop.eventMode = 'static';
  backdrop.on('pointertap', (e) => { if (e.target === backdrop) closePaytableModal(); });
  modal.addChild(backdrop);

  // Responsive scaling for inner content
  const scale = Math.min(1, Math.min(L.sw / 900, L.sh / 900));
  const cardW   = 260 * scale;
  const cardH   = 120 * scale;
  const cardGap = 12  * scale;
  const panelPadX = 32 * scale;
  const panelPadTop = 100 * scale;   // extra room for tab bar
  const panelPadBottom = 40 * scale;
  const gridW = cardW * 2 + cardGap;
  const panelW = gridW + panelPadX * 2;
  const gridH = cardH * 4 + cardGap * 3;
  const panelH = gridH + panelPadTop + panelPadBottom;
  const panelX = (L.sw - panelW) / 2;
  const panelY = (L.sh - panelH) / 2;

  // Panel background
  const panel = new PIXI.Graphics();
  panel.lineStyle(3 * scale, 0xD4956A, 1);
  panel.beginFill(0xFFF4D6, 0.98);
  panel.drawRoundedRect(panelX, panelY, panelW, panelH, 26 * scale);
  panel.endFill();
  panel.lineStyle(1 * scale, 0xE8C898, 0.7);
  panel.drawRoundedRect(panelX + 6 * scale, panelY + 6 * scale, panelW - 12 * scale, panelH - 12 * scale, 22 * scale);
  panel.eventMode = 'static';
  panel.hitArea = new PIXI.Rectangle(panelX, panelY, panelW, panelH);
  modal.addChild(panel);

  // Title
  const title = new PIXI.Text('Bloom Burst', {
    fontFamily: FONT,
    fontSize: 30 * scale,
    fill: 0x3D1C02,
  });
  title.anchor.set(0.5);
  title.x = panelX + panelW / 2;
  title.y = panelY + 28 * scale;
  modal.addChild(title);

  // Close button (×) top-right
  const closeBtn = new PIXI.Container();
  const closeR = 22 * scale;
  const closeBg = new PIXI.Graphics();
  const drawClose = (hover) => {
    closeBg.clear();
    closeBg.lineStyle(2 * scale, 0xC08050, 1);
    closeBg.beginFill(hover ? 0x5C3318 : 0x3D1C02, 0.95);
    closeBg.drawCircle(0, 0, closeR);
    closeBg.endFill();
  };
  drawClose(false);
  closeBtn.addChild(closeBg);
  const closeX = new PIXI.Text('\u00D7', {
    fontFamily: 'Arial, sans-serif',
    fontWeight: 'bold',
    fontSize: closeR * 1.7,
    fill: 0xFFFFFF,
  });
  closeX.anchor.set(0.5);
  closeX.y = 0;
  closeBtn.addChild(closeX);
  closeBtn.x = panelX + panelW - 28 * scale;
  closeBtn.y = panelY + 30 * scale;
  closeBtn.eventMode = 'static';
  closeBtn.cursor = 'pointer';
  closeBtn.hitArea = new PIXI.Circle(0, 0, closeR);
  closeBtn.on('pointerover', () => drawClose(true));
  closeBtn.on('pointerout', () => drawClose(false));
  closeBtn.on('pointertap', () => closePaytableModal());
  modal.addChild(closeBtn);

  // ─── Tab bar ─────────────────────────────────────────────────────────────
  const tabs = [
    { key: 'paytable', label: 'Paytable' },
    { key: 'rules',    label: 'Rules' },
  ];
  const tabBarY = panelY + 62 * scale;
  const tabW    = 140 * scale;
  const tabH    = 34  * scale;
  const tabGap  = 10  * scale;
  const tabsTotalW = tabs.length * tabW + (tabs.length - 1) * tabGap;
  const tabsStartX = panelX + (panelW - tabsTotalW) / 2;

  const tabSprites = [];
  tabs.forEach((tab, idx) => {
    const t = new PIXI.Container();
    const tx = tabsStartX + idx * (tabW + tabGap) + tabW / 2;
    t.x = tx;
    t.y = tabBarY;

    const bg = new PIXI.Graphics();
    const draw = (active, hover) => {
      bg.clear();
      bg.lineStyle(2 * scale, 0xC08050, 1);
      bg.beginFill(active ? 0xFFE0A0 : (hover ? 0xF3DFB8 : 0xFFF8E6), 1);
      bg.drawRoundedRect(-tabW / 2, -tabH / 2, tabW, tabH, tabH * 0.4);
      bg.endFill();
    };
    draw(idx === 0, false);
    t.addChild(bg);

    const lbl = new PIXI.Text(tab.label, {
      fontFamily: FONT, fontSize: 16 * scale,
      fill: idx === 0 ? 0x3D1C02 : 0x7C5332,
    });
    lbl.anchor.set(0.5);
    t.addChild(lbl);

    t.eventMode = 'static';
    t.cursor = 'pointer';
    t.hitArea = new PIXI.RoundedRectangle(-tabW / 2, -tabH / 2, tabW, tabH, tabH * 0.4);
    t.on('pointerover', () => { if (!t.isActive) draw(false, true); });
    t.on('pointerout',  () => { if (!t.isActive) draw(false, false); });
    t.on('pointertap',  () => setActiveTab(idx));

    t.isActive = (idx === 0);
    t.draw = draw;
    t.label = lbl;
    t.key = tab.key;
    tabSprites.push(t);
    modal.addChild(t);
  });

  function setActiveTab(activeIdx) {
    tabSprites.forEach((t, i) => {
      const active = (i === activeIdx);
      t.isActive = active;
      t.draw(active, false);
      t.label.style.fill = active ? 0x3D1C02 : 0x7C5332;
    });
    // Show / hide content containers
    if (paytableContent) paytableContent.visible = (tabSprites[activeIdx].key === 'paytable');
    if (rulesContent)    rulesContent.visible    = (tabSprites[activeIdx].key === 'rules');
  }

  // ─── Paytable content ────────────────────────────────────────────────────
  const paytableContent = new PIXI.Container();
  modal.addChild(paytableContent);

  const sub = new PIXI.Text(`Coins paid per Full Bloom (bet ${player.bet})`, {
    fontFamily: FONT, fontSize: 12 * scale, fill: 0x9C6A1A, letterSpacing: 1,
  });
  sub.anchor.set(0.5);
  sub.x = panelX + panelW / 2;
  sub.y = panelY + 88 * scale;
  paytableContent.addChild(sub);

  const sortedColors = [...GAME.COLORS].sort((a, b) => b.basePay - a.basePay);
  const gridX = panelX + panelPadX;
  const gridY = panelY + panelPadTop;
  const flowerPreviewCell = Math.min(cardH - 20 * scale, 96 * scale);

  for (let i = 0; i < sortedColors.length; i++) {
    const color = sortedColors[i];
    const row = Math.floor(i / 2);
    const col = i % 2;
    const cx = gridX + col * (cardW + cardGap);
    const cy = gridY + row * (cardH + cardGap);
    const isTop = i < 2;

    const card = new PIXI.Graphics();
    card.lineStyle(2.5 * scale, isTop ? 0xFFD700 : 0xC08050, 1);
    card.beginFill(isTop ? 0xFFF9D6 : 0xFFFBF0, 1);
    card.drawRoundedRect(cx, cy, cardW, cardH, 14 * scale);
    card.endFill();
    paytableContent.addChild(card);

    const preview = new FlowerSymbol(color.name, 8, flowerPreviewCell);
    preview.x = cx + cardH / 2;
    preview.y = cy + cardH / 2;
    paytableContent.addChild(preview);

    const name = new PIXI.Text(color.name, {
      fontFamily: FONT, fontSize: 22 * scale, fill: 0x3D1C02,
    });
    name.x = cx + cardH + 4 * scale;
    name.y = cy + 18 * scale;
    paytableContent.addChild(name);

    const coinVal = color.basePay * player.bet;
    const pay = new PIXI.Text(`+${fmtCurrency(coinVal)}`, {
      fontFamily: FONT, fontSize: 28 * scale,
      fill: isTop ? 0xD4A017 : 0xE65C00,
      stroke: 0x3D1C02, strokeThickness: 3 * scale,
    });
    pay.x = cx + cardH + 4 * scale;
    pay.y = cy + cardH * 0.48;
    paytableContent.addChild(pay);

  }

  // ─── Rules content ───────────────────────────────────────────────────────
  const rulesContent = new PIXI.Container();
  rulesContent.visible = false;
  modal.addChild(rulesContent);

  const rulesHeader = new PIXI.Text('How to Play', {
    fontFamily: FONT, fontSize: 20 * scale, fill: 0x3D1C02,
  });
  rulesHeader.anchor.set(0.5);
  rulesHeader.x = panelX + panelW / 2;
  rulesHeader.y = panelY + 102 * scale;
  rulesContent.addChild(rulesHeader);

  const rulesText = (ALT_MODE === 'alt2')
? `The Grid
• 4 rows × 5 columns of flower pots. Every cell always holds one flower.
• Each flower has a colour and starts with 1 – 4 petals.

Transfers
• Adjacent same-colour flowers exchange petals — a petal moves from one
  flower to a same-colour neighbour to its right or directly below.
• Transfers keep going until no more can be made.

Full Bloom
• When a flower reaches 8 petals, it blooms and pays its colour's base
  value × bet.
• Each bloom also DROPS a multiplier tile on its own cell and HALF of
  that tile's value on all 8 adjacent cells (up, down, left, right and
  diagonals). Tile values are randomly picked from:
    4×   8×   10×   20×   50×   100×   500×
• When more than one bloom spreads onto the same cell, the values SUM.

Bloom on a Multiplier
• If a later bloom happens on a cell that already has a multiplier, that
  bloom's payout is multiplied by the cell's accumulated multiplier.
• Multipliers persist on their cell for the rest of the spin — they don't

Empty Dissolve
• A flower that gives away all its petals just poofs away. In this mode

Cascades
• Dissolved cells are refilled from above with fresh random flowers.
• Transfers run again on the new grid; cascades continue as long as
  new blooms or empties keep happening.

Buy Feature
• Pays 100 × bet for 15 free spins.
• Accumulated multiplier tiles PERSIST across every free spin — they
  only reset when the feature ends.`
: `The Grid

  const rulesBody = new PIXI.Text(rulesText, {

// ─── GENERIC CONFIRM / ANNOUNCEMENT MODAL ───────────────────────────────────
// Builds a centred rounded-panel dialog with a title, body text, and any
// number of coloured action buttons. Returns the modal container; caller is
// responsible for destroying via the `close()` method attached to each
// button's handler.
function _openSimpleModal({ title, bodyLines, buttons }) {
  const L = calculateLayout(app.screen.width, app.screen.height);
  const scale = Math.min(1, Math.min(L.sw / 900, L.sh / 900));

  const modal = new PIXI.Container();
  modal.alpha = 0;
  app.stage.addChild(modal);

  // Dim backdrop
  const backdrop = new PIXI.Graphics();
  backdrop.beginFill(0x000000, 0.72);
  backdrop.drawRect(0, 0, L.sw, L.sh);
  backdrop.endFill();
  backdrop.eventMode = 'static';
  modal.addChild(backdrop);

  // Panel sized relative to content.
  const panelW = Math.min(L.sw * 0.8, 480 * scale);
  const titleFS = Math.max(24, 32 * scale);
  const bodyFS  = Math.max(16, 22 * scale);
  const btnH    = Math.max(44, 56 * scale);
  const btnFS   = Math.max(16, 20 * scale);
  const padY    = 28 * scale;
  const lineGap = 8 * scale;

  // Measure body height
  const titleH = titleFS + lineGap;
  const bodyH  = (bodyLines.length) * (bodyFS + lineGap);
  const btnRowH = btnH + padY;
  const panelH = padY + titleH + padY * 0.5 + bodyH + padY + btnRowH;

  const panelX = (L.sw - panelW) / 2;
  const panelY = (L.sh - panelH) / 2;

  const panel = new PIXI.Graphics();
  panel.lineStyle(3 * scale, 0xC08050, 0.95);
  panel.beginFill(0x2A1808, 0.98);
  panel.drawRoundedRect(panelX, panelY, panelW, panelH, 24 * scale);
  panel.endFill();
  modal.addChild(panel);

  // Title
  if (title) {
    const t = new PIXI.Text(title, {
      fontFamily: FONT,
      fontSize: titleFS,
      fill: 0xFFD54F,
      letterSpacing: 0.8,
      align: 'center',
    });
    t.anchor.set(0.5, 0);
    t.x = panelX + panelW / 2;
    t.y = panelY + padY;
    modal.addChild(t);
  }

  // Body lines
  let lineY = panelY + padY + titleH + padY * 0.5;
  for (const line of bodyLines) {
    const isEmphasis = line.emphasis === true;
    const t = new PIXI.Text(line.text ?? line, {
      fontFamily: FONT,
      fontSize: isEmphasis ? bodyFS * 1.4 : bodyFS,
      fill: isEmphasis ? 0xFFD54F : 0xFFECB3,
      align: 'center',
      wordWrap: true,
      wordWrapWidth: panelW - padY * 2,
    });
    t.anchor.set(0.5, 0);
    t.x = panelX + panelW / 2;
    t.y = lineY;
    modal.addChild(t);
    lineY += (isEmphasis ? bodyFS * 1.4 : bodyFS) + lineGap;
  }

  // Buttons row
  const close = () => {
    gsap.to(modal, {
      alpha: 0,
      duration: 0.15,
      ease: 'power2.in',
      onComplete: () => modal.destroy({ children: true }),
    });
  };

  const btnCount = buttons.length;
  const btnGap = 16 * scale;
  const btnW = (panelW - padY * 2 - btnGap * (btnCount - 1)) / btnCount;
  const btnY = panelY + panelH - padY - btnH / 2;
  buttons.forEach((b, i) => {
    const bx = panelX + padY + btnW * i + btnGap * i + btnW / 2;
    const bcont = new PIXI.Container();
    bcont.x = bx; bcont.y = btnY;
    const bbg = new PIXI.Graphics();
    const drawBtnBg = (hover) => {
      bbg.clear();
      bbg.lineStyle(2 * scale, b.stroke || 0xFFFFFF, 0.9);
      bbg.beginFill(hover ? (b.hoverFill || b.fill) : b.fill, 1);
      bbg.drawRoundedRect(-btnW / 2, -btnH / 2, btnW, btnH, btnH * 0.3);
      bbg.endFill();
    };
    drawBtnBg(false);
    const btxt = new PIXI.Text(b.label, {
      fontFamily: FONT,
      fontSize: btnFS,
      fill: 0xFFFFFF,
      letterSpacing: 0.5,
    });
    btxt.anchor.set(0.5);
    bcont.addChild(bbg);
    bcont.addChild(btxt);
    bcont.eventMode = 'static';
    bcont.cursor = 'pointer';
    bcont.hitArea = new PIXI.RoundedRectangle(-btnW / 2, -btnH / 2, btnW, btnH, btnH * 0.3);
    bcont.on('pointerover', () => {
      drawBtnBg(true);
      gsap.to(bcont.scale, { x: 1.04, y: 1.04, duration: 0.12 });
    });
    bcont.on('pointerout', () => {
      drawBtnBg(false);
      gsap.to(bcont.scale, { x: 1, y: 1, duration: 0.12 });
    });
    bcont.on('pointertap', () => {
      if (b.onTap) b.onTap(close);
      else close();
    });
    modal.addChild(bcont);
  });

  gsap.to(modal, { alpha: 1, duration: 0.18, ease: 'power2.out' });
  return { modal, close };
}

function openBuyFeatureModal() {
  if (!canBuyFeature()) return;
  const cost = featureCost();
  const dialog = _openSimpleModal({
    title: 'Buy Feature',
    bodyLines: [
      `Are you sure you want to buy`,
      `15 free spins for ${fmtCurrency(cost)}?`,
      ` `,
      `Multiplier tiles dropped during the`,
      `feature PERSIST across all 15 spins.`,
    ],
    buttons: [
      {
        label: 'CANCEL',
        fill:  0xB22A2A,
        hoverFill: 0xD43C3C,
        stroke: 0xFF6B6B,
        onTap: (close) => close(),
      },
      {
        label: 'YES',
        fill:  0x2E7D32,
        hoverFill: 0x3FA143,
        stroke: 0x7FE080,
        onTap: (close) => {
          close();
          startFeature();
        },
      },
    ],
  });
  scene.buyFeatureModal = dialog.modal;
}

function openFeatureResultModal(totalWon) {
  const dialog = _openSimpleModal({
    title: 'Congratulations',
    bodyLines: [
      { text: 'You won' },
      { text: fmtCurrency(totalWon), emphasis: true },
    ],
    buttons: [
      {
        label: 'OK',
        fill:  0x2E7D32,
        hoverFill: 0x3FA143,
        stroke: 0x7FE080,
        onTap: (close) => close(),
      },
    ],
  });
  scene.featureResultModal = dialog.modal;
}

// ─── SPIN FLOW ───────────────────────────────────────────────────────────────

async function onSpinClick() {
  if (!scene.spinButton || scene.spinButton.busy) return;
  if (!canAffordSpin()) {
    flashInsufficientBalance();
    return;
  }

  const inFeature = player.feature.active;
  const bet = inFeature ? player.feature.lockedBet : player.bet;

  // 1. Deduct the bet up front (skip during free spins).
  if (!inFeature) {
    const prevBal = player.balance;
    player.balance -= bet;
    updateBalanceText(prevBal);
  }
  updateSpinButtonState();

  // 2. Reset the spin UI state
  scene.spinButton._setBusy(true);
  if (scene.winPill && scene.winPill.resetPermanent) scene.winPill.resetPermanent();
  updateMultiplierBar(1, 0);
  updateWinText(0);
  // Status line: blanks between regular spins, but during the feature we
  // keep showing the running cumulative "WIN <total>" so the player can
  // watch it climb across all 15 spins without a reset each time.
  if (inFeature) {
    updateStatusText(`WIN ${fmtCurrency(player.feature.totalWin)}`);
  } else {
    updateStatusText('');
  }
  // Alt-2: wipe any multiplier tiles from the previous spin — EXCEPT during
  // the free-spin feature where tiles accumulate across all 15 spins.
  if (!inFeature) clearAllTileBadges();

  // 3. Run the deterministic simulation — animator replays it. In the
  //    feature, carry tile state across spins via the cellMults handoff.
  const runOpts = (inFeature && ALT_MODE === 'alt2')
    ? { cellMults: player.feature.cellMults }
    : {};
  const result = BloomSort.runSpin(bet, runOpts);
  if (inFeature && ALT_MODE === 'alt2' && result.cellMults) {
    player.feature.cellMults = result.cellMults;
  }

  if (!animator) animator = new SpinAnimator({ scene, app });

  animator.onProgress = (ev) => {
    if (ev.type === 'dissolve') {
      const runningWin = ev.payoutTotal * bet;
      if (ALT_MODE === 'alt2') {
        // Tile-multiplier mode: running total shows in the bottom status
        // text. During the free-spin feature, it's cumulative across all
        // 15 spins (feature.totalWin baseline + this spin's running).
        const displayWin = inFeature
          ? player.feature.totalWin + runningWin
          : runningWin;
        if (displayWin > 0) {
          updateStatusText(`WIN ${fmtCurrency(displayWin)}`);
        }
      } else {
        // Chain-multiplier mode: the top pill shows the running pre-mult win.
        updateWinText(runningWin, true);
      }
    }
  };

  animator.onEnd = async (finalResult) => {
    try {
      const mult = finalResult.multiplier;
      const baseWin = finalResult.totalPayout * bet;   // pre-multiplier
      const finalWin = finalResult.finalWin;           // post-multiplier

      if (finalWin > 0) {
        const preCreditBal = player.balance;
        player.balance += finalWin;
        updateBalanceText(preCreditBal);
      }

      updateRtpText();
      currentGrid = finalResult.finalGrid;

      if (ALT_MODE === 'alt2') {
        // Tile mode: no × reveal (no global multiplier). The bottom status
        // has already been ticking up during the cascade; just finalise.
        if (player.feature.active) {
          // Accumulate this spin's win into the feature total. The status
          // shows the cumulative amount won across the feature so far.
          player.feature.totalWin = (player.feature.totalWin || 0) + finalWin;
          updateStatusText(`WIN ${fmtCurrency(player.feature.totalWin)}`);
        } else if (finalWin > 0) {
          updateStatusText(`WIN ${fmtCurrency(finalWin)}`);
        } else {
          updateStatusText('Good luck!');
        }
      } else {
        // Chain mode: original × reveal, then final readout in the status.
        if (mult > 1 && finalWin > 0) {
          await animateMultiplication(baseWin, finalWin);
          if (finalWin >= bet) pulseWinPill();
        } else {
          updateWinText(finalWin, true);
          if (finalWin > 0 && finalWin >= bet) pulseWinPill();
        }
        if (finalWin > 0) {
          updateStatusText(`WIN ${fmtCurrency(finalWin)}`);
        } else {
          updateStatusText('Good luck!');
        }
      }

      uiState.multiplier = 1;
      uiState.emptyCount = 0;

      // Free-spin feature bookkeeping — decrement counter, end feature on
      // the final spin, or auto-chain to the next spin.
      let chainNext = false;
      if (player.feature.active) {
        player.feature.spinsLeft -= 1;
        if (player.feature.spinsLeft <= 0) {
          endFeature();
        } else {
          refreshFeatureUI();
          chainNext = true;   // more spins to play — auto-spin next
        }
      }
      // Stash for the finally block.
      this._chainNext = chainNext;
    } finally {
      // Always re-enable the spin button, even if something threw above.
      // The error (if any) still propagates to the console.
      const doAutoSpin = this._chainNext;
      this._chainNext = false;
      setTimeout(() => {
        if (scene.spinButton) {
          scene.spinButton._setBusy(false);
          updateSpinButtonState();
        }
        // Buy-feature affordability can change as balance changes.
        if (scene.buyBtn && scene.buyBtn._refresh) scene.buyBtn._refresh();
        // Auto-chain the next free spin after a short breather.
        if (doAutoSpin && player.feature.active) {
          setTimeout(() => { onSpinClick(); }, 400);
        }
      }, 200);
    }
  };

  await animator.play(result);
}

// ═══════════════════════════════════════════════════════════════════════════════
// INITIAL BUILD & RESIZE
// ═══════════════════════════════════════════════════════════════════════════════
function rebuild() {
  const L = calculateLayout(app.screen.width, app.screen.height);
  buildScene(L);
}

rebuild();

let resizeTimer = null;
window.addEventListener('resize', () => {
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(rebuild, 50);
});

// ─── KEYBOARD: Space = spin ─────────────────────────────────────────────────
// Standard slot-game convention — hitting space triggers the spin. We also
// use Escape to close the paytable modal. Space swallowed everywhere so it
// doesn't scroll the page or activate a focused button by accident.
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (scene.paytableModal) {
      closePaytableModal();
      return;
    }
    onSpinClick();
  } else if (e.code === 'Escape' && scene.paytableModal) {
    closePaytableModal();
  }
});

})();
</script>
